<body>

<script>
// ===== ตั้งค่าระบบ — แก้ครั้งเดียว (ใส่ค่าของร้านคุณ) =====
const CONFIG={
  SUPABASE_URL:"https://opxnxqrafccrwygtmhyi.supabase.co",
  SUPABASE_ANON_KEY:"sb_publishable_MUlg4CcIMELVfP9wkrtcsw_Hvt-NdNl"
};
const CONFIG_READY=()=>/^https:\/\//.test(CONFIG.SUPABASE_URL)&&!CONFIG.SUPABASE_URL.includes("YOUR-")&&CONFIG.SUPABASE_ANON_KEY.length>20&&!CONFIG.SUPABASE_ANON_KEY.includes("YOUR-");
const BRAND={ink:"#14182B",orange:"#F2691E",up:"#0E9F6E",down:"#E02424",amber:"#F59E0B",slate:"#5B6472"};
const DAY=86400000, LS="salitdok_session";
const SRC_FALLBACK=[["manual","หน้าร้าน/กรอกเอง"],["grab","Grab"],["lineman","LINE MAN"],["shopee","Shopee"]];
const SRC_COLOR_FALLBACK={grab:"#00B14F",lineman:"#06C755",shopee:"#EE4D2D",manual:"#6B7280",other:"#6B7280"};
// Master Data: อ่านจาก sales_channels ถ้ามี ไม่งั้น fallback ค่าเดิม
function chActive(){const cs=(state.data&&state.data.salesChannels)||[];return cs.filter(c=>c.active!==false).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));}
function chAll(){const cs=(state.data&&state.data.salesChannels)||[];return cs.slice().sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));}
function chBySlug(slug){const cs=(state.data&&state.data.salesChannels)||[];return cs.find(c=>c.slug===slug)||null;}
function chName(slug){const c=chBySlug(slug);if(c)return c.name;const f=SRC_FALLBACK.find(x=>x[0]===slug);return f?f[1]:(slug||"-");}
function chColor(slug){const c=chBySlug(slug);if(c&&c.color)return c.color;return SRC_COLOR_FALLBACK[slug]||"#6B7280";}
function chLogo(slug){const c=chBySlug(slug);return c&&c.logo?c.logo:"";}
// SRC = [[slug,name],...] ช่องทางที่ active (ไว้วนสร้าง chips) — dynamic
function srcList(){const a=chActive();return a.length?a.map(c=>[c.slug,c.name]):SRC_FALLBACK;}
// pricing channels = ทุกช่องทาง active (รวม manual ให้ override ได้)
function priceChannels(){const a=chActive();return a.length?a.map(c=>[c.slug,c.name]):[["grab","Grab"],["lineman","LINE MAN"],["shopee","Shopee"],["manual","หน้าร้าน"]];}
// backward-compat proxies (โค้ดเดิมอ้าง SRC_MAP/SRC_COLOR → เด้งไป master data)
const SRC_MAP=new Proxy({},{get:(_,k)=>chName(String(k))});
const SRC_COLOR=new Proxy({},{get:(_,k)=>chColor(String(k))});
const TYPES=[["food","อาหาร"],["drink","เครื่องดื่ม"],["addon","Add-on"],["set","ชุดเซ็ต"]];
const UNITS=["g","ml","ฟอง","ชิ้น","portion"];
const UNITS_MASTER=["g","kg","ml","L","ชิ้น","ฟอง","portion","แพ็ค","ถุง","ขวด","หม้อ","ถัง","ลัง"];
function stepForUnit(u){return /(^|[^a-z])(kg|l|ลิตร|liter|litre)([^a-z]|$)/i.test(String(u||""))?0.1:1;}
const BULK={g:[["g",1],["kg",1000]],ml:[["ml",1],["ลิตร",1000]]};
const state={s:null,data:null,view:"dash",prev:"dash",menuSeg:"items",menuFilter:null,aiActions:[]};
let draft=null, editingMenu=null, editingAddon=null, editingRecipe=[], editingIng=null, recipeCtx={priceId:"miPrice",sumId:"recipeSum"};
const bkkDate=d=>new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Bangkok"}).format(d);
const bkkDateTime=d=>new Intl.DateTimeFormat("th-TH",{timeZone:"Asia/Bangkok",day:"2-digit",month:"2-digit",year:"2-digit",hour:"2-digit",minute:"2-digit"}).format(d);
const monthOf=d=>bkkDate(d).slice(0,7);
const fmtTHB=n=>"฿"+Math.round(n||0).toLocaleString("th-TH");
const fmt2=n=>(Math.round((n||0)*100)/100).toLocaleString("th-TH",{maximumFractionDigits:2});
const daysSince=iso=>iso?Math.floor((Date.now()-new Date(iso).getTime())/DAY):Infinity;
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function jwtSub(t){try{return JSON.parse(atob(t.split(".")[1].replace(/-/g,"+").replace(/_/g,"/"))).sub;}catch(e){return null;}}
function toast(m){const el=document.getElementById("toast");el.textContent=m;el.classList.add("show");clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),2500);}
function lastSeen(iso){const d=daysSince(iso);return d===0?"วันนี้":d===1?"เมื่อวาน":isFinite(d)?d+" วันก่อน":"—";}
const val=id=>{const el=document.getElementById(id);return el?el.value:"";};
function toLocalInput(date){const p=new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Bangkok",year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",hour12:false}).formatToParts(date);const g=t=>p.find(x=>x.type===t).value;let h=g("hour");if(h==="24")h="00";return `${g("year")}-${g("month")}-${g("day")}T${h}:${g("minute")}`;}
function fromLocalInput(v){if(!v)return new Date().toISOString();let s=v.length===16?v+":00":v;return s+"+07:00";}
function deltaPill(label,pct){const c=pct===null?"#c9cfdd":(pct<0?"#ff9b9b":"#86e0bd");const t=pct===null?"—":`${pct<0?"▼":"▲"}${Math.abs(pct)}%`;return `<span class="cmppill">${label} <b style="color:${c}">${t}</b></span>`;}

function persistSession(){if(!state.s)return;localStorage.setItem(LS,JSON.stringify({email:state.s.email,token:state.s.token,refresh:state.s.refresh,expiresAt:state.s.expiresAt}));}
function setSession(email,d){state.s={url:CONFIG.SUPABASE_URL,key:CONFIG.SUPABASE_ANON_KEY,email,token:d.access_token,refresh:d.refresh_token,expiresAt:Date.now()+((d.expires_in||3600)*1000)};persistSession();}
async function signIn(email,password){let r;try{r=await fetch(CONFIG.SUPABASE_URL+"/auth/v1/token?grant_type=password",{method:"POST",headers:{apikey:CONFIG.SUPABASE_ANON_KEY,"Content-Type":"application/json"},body:JSON.stringify({email,password})});}catch(e){throw new Error("เครือข่ายเข้าไม่ถึง Supabase — ตรวจการเชื่อมต่อ");}const d=await r.json();if(!r.ok)throw new Error(d.error_description||d.msg||d.error||"อีเมลหรือรหัสผ่านไม่ถูกต้อง");setSession(email,d);}
async function doRefresh(){if(!state.s||!state.s.refresh){const e=new Error("เซสชันหมดอายุ");e.code=401;throw e;}let r;try{r=await fetch(CONFIG.SUPABASE_URL+"/auth/v1/token?grant_type=refresh_token",{method:"POST",headers:{apikey:CONFIG.SUPABASE_ANON_KEY,"Content-Type":"application/json"},body:JSON.stringify({refresh_token:state.s.refresh})});}catch(e){throw new Error("เครือข่ายเข้าไม่ถึง Supabase");}const d=await r.json();if(!r.ok){const e=new Error("เซสชันหมดอายุ");e.code=401;throw e;}state.s.token=d.access_token;state.s.refresh=d.refresh_token||state.s.refresh;state.s.expiresAt=Date.now()+((d.expires_in||3600)*1000);persistSession();}
async function ensureFresh(){if(state.s&&state.s.expiresAt&&Date.now()>state.s.expiresAt-60000)await doRefresh();}
async function rest(s,path){await ensureFresh();const go=()=>fetch(s.url+"/rest/v1/"+path,{headers:{apikey:s.key,Authorization:"Bearer "+s.token}});let r;try{r=await go();}catch(e){throw new Error("เครือข่ายเข้าไม่ถึง Supabase");}if(r.status===401){try{await doRefresh();}catch(_){const e=new Error("เซสชันหมดอายุ");e.code=401;throw e;}try{r=await go();}catch(e){throw new Error("เครือข่ายเข้าไม่ถึง Supabase");}}if(r.status===401){const e=new Error("เซสชันหมดอายุ");e.code=401;throw e;}const d=await r.json();if(!r.ok)throw new Error(d.message||d.hint||"ดึงข้อมูลไม่สำเร็จ");return d;}
async function safeRest(s,path){try{return await rest(s,path);}catch(e){return [];}}

function decodeReason(x){if(!x)return x;try{return decodeURIComponent(x);}catch(_){return x;}}
function withReason(reason,fn){AUDIT_REASON=(reason||"").trim();return Promise.resolve().then(fn).finally(()=>{AUDIT_REASON="";});}
async function send(s,method,path,body,prefer){await ensureFresh();const hdr=()=>{const h={apikey:s.key,Authorization:"Bearer "+s.token,"Content-Type":"application/json",Prefer:prefer||"return=representation"};if(AUDIT_REASON){try{h["x-audit-reason"]=encodeURIComponent(AUDIT_REASON);}catch(_){}}return h;};const go=()=>fetch(s.url+"/rest/v1/"+path,{method,headers:hdr(),body:body?JSON.stringify(body):undefined});let r;try{r=await go();}catch(e){throw new Error("เครือข่ายเข้าไม่ถึง Supabase");}if(r.status===401){try{await doRefresh();}catch(_){const e=new Error("เซสชันหมดอายุ");e.code=401;throw e;}try{r=await go();}catch(e){throw new Error("เครือข่ายเข้าไม่ถึง Supabase");}}const t=await r.text();const d=t?JSON.parse(t):null;if(!r.ok)throw new Error((d&&(d.message||d.hint))||"ทำรายการไม่สำเร็จ");return d;}
const post=(s,p,b,pr)=>send(s,"POST",p,b,pr);
const patch=(s,p,b)=>send(s,"PATCH",p,b,"return=minimal");
const del=(s,p)=>send(s,"DELETE",p,null,"return=minimal");
// เรียก Postgres function (RPC)
async function rpc(s,fn,args){await ensureFresh();const go=()=>fetch(s.url+"/rest/v1/rpc/"+fn,{method:"POST",headers:{apikey:s.key,Authorization:"Bearer "+s.token,"Content-Type":"application/json"},body:JSON.stringify(args||{})});let r;try{r=await go();}catch(e){throw new Error("เครือข่ายเข้าไม่ถึง Supabase");}if(r.status===401){try{await doRefresh();}catch(_){const e=new Error("เซสชันหมดอายุ");e.code=401;throw e;}try{r=await go();}catch(e){throw new Error("เครือข่ายเข้าไม่ถึง Supabase");}}const t=await r.text();const d=t?JSON.parse(t):null;if(!r.ok)throw new Error((d&&(d.message||d.hint))||"เรียกฟังก์ชันไม่สำเร็จ");return d;}

async function loadStore(s){
  const stores=await rest(s,"stores?select=id,name,timezone,settings&limit=1");
  if(!stores.length)throw new Error("ไม่พบร้าน — ล็อกอินด้วย user เจ้าของร้าน");
  return stores[0];
}
async function loadOrders(s,storeId,sinceISO){
  const since=sinceISO||new Date(Date.now()-35*DAY).toISOString();
  const q=ext=>`orders?select=id,customer_id,source,net_total,ordered_at,food_cost_snapshot,packaging_cost_snapshot,consumable_cost_snapshot,cogs_snapshot,${ext}&store_id=eq.${storeId}&status=eq.completed&ordered_at=gte.${since}&order=ordered_at.desc`;
  const oxA=q(`order_items(menu_item_id,item_name,quantity,cost_snapshot,food_cost_snapshot,pkg_cost_snapshot,order_item_addons(name,quantity,food_cost_snapshot,pkg_cost_snapshot))`);
  const oxB=q(`order_items(menu_item_id,item_name,quantity,cost_snapshot,order_item_addons(name,quantity))`);
  const oxC=q(`order_items(menu_item_id,item_name,quantity,order_item_addons(name,quantity))`);
  try{return await rest(s,oxA);}catch(e){try{return await rest(s,oxB);}catch(e2){return await rest(s,oxC);}}
}

  const purRaw=await safeRest(s,`ingredient_purchases?select=id,inventory_item_id,ingredient_id,purchased_at,qty_base,total_price,note,purchase_unit,purchase_qty,purchase_factor&store_id=eq.${storeId}&order=purchased_at.desc`);

  const recRaw=await safeRest(s,`recipe_items?select=id,menu_item_id,addon_id,inventory_item_id,ingredient_id,qty&store_id=eq.${storeId}`);
  const recipes=recRaw.map(r=>({...r,item_id:r.inventory_item_id||r.ingredient_id}));
  const cats=await safeRest(s,`categories?select=id,name,sort_order,color,is_active&store_id=eq.${storeId}&order=sort_order.asc`);
  const pkgDefaults=await safeRest(s,`packaging_defaults?select=id,source,inventory_item_id,menu_item_id,qty,toggle_key,active,sort_order&store_id=eq.${storeId}&order=sort_order.asc`);
  const channelPrices=await safeRest(s,`channel_prices?select=id,source,menu_item_id,addon_id,price,active&store_id=eq.${storeId}`);
  const stock=await safeRest(s,`v_stock_valuation?select=inventory_item_id,on_hand,avg_cost,stock_value,reorder_level,low_stock&store_id=eq.${storeId}`);
  const expenseCats=await safeRest(s,`expense_categories?select=id,name,type,is_cogs,active,sort_order&store_id=eq.${storeId}&order=sort_order.asc,name.asc`);
  const cashAccounts=await safeRest(s,`cash_accounts?select=id,name,type,opening_balance,active,sort_order&store_id=eq.${storeId}&order=sort_order.asc`);
  const cashBalance=await safeRest(s,`v_cash_balance?select=account_id,balance&store_id=eq.${storeId}`);
  const feeSettings=await safeRest(s,`platform_fee_settings?select=id,source,fee_rate,fee_vat_rate,effective_from,active,note&store_id=eq.${storeId}&order=effective_from.desc,created_at.desc`);
  const adCosts=await safeRest(s,`platform_ad_costs?select=id,source,campaign,period_start,period_end,ad_cost_before_vat,ad_vat_rate,ad_vat_amount,ad_cost_including_vat,note&store_id=eq.${storeId}&order=period_start.desc`);
  const expenses=await safeRest(s,`expenses?select=id,category_id,cash_account_id,amount,source,paid_at,note&store_id=eq.${storeId}&order=paid_at.desc&limit=60`);
  const recurring=await safeRest(s,`recurring_expenses?select=id,category_id,cash_account_id,name,amount,source,day_of_month,active&store_id=eq.${storeId}`);
  const monthStart=bkkDate(new Date()).slice(0,7)+"-01";
  const plMonth=await safeRest(s,`v_pl_daily?select=revenue,total_app_cost,cogs,opex,net_profit&store_id=eq.${storeId}&day=gte.${monthStart}`);
  const settlements=await safeRest(s,`v_settlement_reconcile?select=*&store_id=eq.${storeId}&order=period_start.desc`);
  const salesChannels=await safeRest(s,`sales_channels?select=id,slug,name,color,logo,default_fee_rate,default_fee_vat_rate,uses_settlement,uses_epayment,is_default,active,sort_order&store_id=eq.${storeId}&order=sort_order.asc`);
  const prodRecipes=await safeRest(s,`production_recipes?select=id,output_item_id,version,is_current,output_unit,standard_input_qty,standard_output_qty,standard_yield_pct,shelf_life_days,active,note,created_at&store_id=eq.${storeId}&order=output_item_id.asc,version.desc`);
  const prodRecipeItems=await safeRest(s,`production_recipe_items?select=id,recipe_id,input_item_id,qty`);
  const prodOrders=await safeRest(s,`production_orders?select=id,recipe_id,recipe_version,output_item_id,batch_no,status,multiplier,planned_output,actual_output,waste_qty,yield_loss,actual_yield_pct,input_cost_total,unit_cost,output_unit,produced_at,expiry_at,note,created_at&store_id=eq.${storeId}&status=neq.archived&order=produced_at.desc.nullslast,created_at.desc&limit=200`);

async function loadAll(s){
  const store=await loadStore(s);
  const orders=await loadOrders(s,store.id);
  const customers=await loadCustomers(s,store.id);
  const loyaltyOrders=await loadLoyalty(s,store.id);
  const m=await loadMaster(s,store.id);
  return {store,orders,customers,loyaltyOrders,ingredients:m.inv,inv:m.inv,menu:m.menu,addons:m.addons,links:m.links,purchases:m.purchases,recipes:m.recipes,cats:m.cats,pkgDefaults:m.pkgDefaults,channelPrices:m.channelPrices,stock:m.stock,expenseCats:m.expenseCats,cashAccounts:m.cashAccounts,cashBalance:m.cashBalance,feeSettings:m.feeSettings,adCosts:m.adCosts,expenses:m.expenses,recurring:m.recurring,plMonth:m.plMonth,settlements:m.settlements,salesChannels:m.salesChannels,prodRecipes:m.prodRecipes,prodRecipeItems:m.prodRecipeItems,prodOrders:m.prodOrders,semiCost:m.semiCost,purchaseUnits:m.purchaseUnits};
}

function loyaltyStats(){const now=Date.now(),c30=now-30*DAY,c60=now-60*DAY,c90=now-90*DAY,m={};for(const o of (state.data.loyaltyOrders||[])){const id=o.customer_id;if(!id)continue;const tm=new Date(o.ordered_at).getTime(),net=Number(o.net_total)||0;const e=m[id]||(m[id]={s30:0,s90:0,sPrev30:0});if(tm>=c30)e.s30+=net;if(tm>=c90)e.s90+=net;if(tm<c30&&tm>=c60)e.sPrev30+=net;}return m;}
function customerLevel(c,st){if(c.vip_manual)return"vip";if(!(c.total_orders>0))return"new";return levelKey(st?st.s30:0);}
function ageOf(b){if(!b)return null;const d=new Date(b+"T00:00:00"),n=new Date();let a=n.getFullYear()-d.getFullYear();const mo=n.getMonth()-d.getMonth();if(mo<0||(mo===0&&n.getDate()<d.getDate()))a--;return a>=0&&a<130?a:null;}
function daysToBirthday(b){if(!b)return null;const d=new Date(b+"T00:00:00"),today=new Date();today.setHours(0,0,0,0);const t=new Date(today.getFullYear(),d.getMonth(),d.getDate());t.setHours(0,0,0,0);if(t<today)t.setFullYear(t.getFullYear()+1);return Math.round((t-today)/DAY);}
function loyaltySummary(){
  const st=loyaltyStats(),custs=realCustomers();
  const counts={new:0,regular:0,silver:0,gold:0,platinum:0,vip:0},vip=[],birthdaysSoon=[],lapsed=[],promoted=[],demoting=[];
  for(const c of custs){
    const s=st[c.id]||{s30:0,sPrev30:0},lvl=customerLevel(c,s);counts[lvl]=(counts[lvl]||0)+1;
    if(lvl==="vip")vip.push(c);
    const dtb=daysToBirthday(c.birthdate);if(dtb!=null&&dtb<=14)birthdaysSoon.push({c,dtb});
    const since=daysSince(c.last_order_at);if(isFinite(since)&&since>30&&c.total_orders>0)lapsed.push({c,since});
    if(c.total_orders>0&&!c.vip_manual){const ni=LEVEL_ORDER.indexOf(levelKey(s.s30)),pi=LEVEL_ORDER.indexOf(levelKey(s.sPrev30));
      if(s.s30>0&&ni>pi)promoted.push({c,now:levelKey(s.s30)});
      else if(s.sPrev30>0&&ni<pi)demoting.push({c,now:levelKey(s.s30),prev:levelKey(s.sPrev30)});}
  }
  birthdaysSoon.sort((a,b)=>a.dtb-b.dtb);lapsed.sort((a,b)=>b.since-a.since);
  return {counts,vip,birthdaysSoon,lapsed,promoted,demoting,total:custs.length};
}

function ingCostPerUnit(itemId,mkey){
  const ps=state.data.purchases.filter(p=>p.item_id===itemId);
  let sp=0,sq=0;for(const p of ps)if(String(p.purchased_at).slice(0,7)===mkey){sp+=Number(p.total_price);sq+=Number(p.qty_base);}
  if(sq>0)return sp/sq;
  let latest=null;for(const p of ps){if(!latest||String(p.purchased_at)>String(latest.purchased_at))latest=p;}
  return latest&&Number(latest.qty_base)>0?Number(latest.total_price)/Number(latest.qty_base):0;
}
const recipeRowsFor=menuId=>state.data.recipes.filter(r=>r.menu_item_id===menuId);
const recipeRowsForAddon=addonId=>state.data.recipes.filter(r=>r.addon_id===addonId);

function splitCostRows(rows,mkey){let food=0;for(const r of rows){if(invKindOf(r.item_id)!=="food")continue;food+=Number(r.qty)*ingCostPerUnit(r.item_id,mkey);}return {food,pkg:0,total:food};}
function menuCostSplit(menuId,mkey){const rows=recipeRowsFor(menuId).map(r=>({item_id:r.item_id,qty:Number(r.qty)}));if(rows.length)return splitCostRows(rows,mkey);const mm=menuMap()[menuId];const c=(mm&&mm.cost!=null&&mm.cost!=="")?Number(mm.cost):0;return {food:c,pkg:0,total:c};}

function priceFor(menu,source){if(!menu)return 0;const r=channelPriceRow("menu",menu.id,source);return r?Number(r.price):Number(menu.price);}
function addonPriceFor(addon,source){if(!addon)return 0;const r=channelPriceRow("addon",addon.id,source);return r?Number(r.price):Number(addon.price);}
function hasChannelPrice(kind,id,source){return !!channelPriceRow(kind,id,source);}
function addonCostSplit(addonId,mkey){return splitCostRows(recipeRowsForAddon(addonId).map(r=>({item_id:r.item_id,qty:Number(r.qty)})),mkey);}

function computeFacts(data){
  const orders=data.orders,customers=data.customers.filter(c=>!c.is_guest);
  const today=bkkDate(new Date()),yest=bkkDate(new Date(Date.now()-DAY)),wago=bkkDate(new Date(Date.now()-7*DAY)),curMonth=monthOf(new Date());
  const byDay={};for(const o of orders){const d=bkkDate(new Date(o.ordered_at));(byDay[d]||(byDay[d]={sales:0,count:0}));byDay[d].sales+=Number(o.net_total)||0;byDay[d].count+=1;}
  const t=byDay[today]||{sales:0,count:0},y=byDay[yest]||{sales:0,count:0},w=byDay[wago]||{sales:0,count:0};
  const dPct=(a,b)=>b>0?Math.round((a-b)/b*100):null;
  const deltaY=dPct(t.sales,y.sales),deltaW=dPct(t.sales,w.sales),avgBill=t.count?t.sales/t.count:0;
  const spark=[];for(let i=6;i>=0;i--){const d=bkkDate(new Date(Date.now()-i*DAY));spark.push({d,sales:(byDay[d]&&byDay[d].sales)||0,isToday:d===today});}
  let foodToday=0,foodMonth=0,pkgToday=0,pkgMonth=0,conToday=0,conMonth=0,salesMonth=0;const todayIds=new Set();
  for(const o of orders){const dk=bkkDate(new Date(o.ordered_at)),mk=dk.slice(0,7),isToday=dk===today,isMonth=mk===curMonth;
    if(isMonth)salesMonth+=Number(o.net_total)||0;if(isToday&&o.customer_id)todayIds.add(o.customer_id);
    let food=0,pkg=0,con=0,cogs=Number(o.cogs_snapshot)||0;
    if(cogs>0){food=Number(o.food_cost_snapshot)||0;pkg=Number(o.packaging_cost_snapshot)||0;con=Number(o.consumable_cost_snapshot)||0;}
    else{ // fallback ออเดอร์เก่าที่ยังไม่มี rollup — คำนวณจาก snapshot รายบรรทัด (packaging รวมใน pkg)
      for(const it of o.order_items||[]){const q=Number(it.quantity)||0,fs=Number(it.food_cost_snapshot)||0,ps=Number(it.pkg_cost_snapshot)||0,leg=Number(it.cost_snapshot)||0;
        let f=(fs||ps)?fs:leg,p=ps;
        for(const ad of it.order_item_addons||[]){const aq=Number(ad.quantity)||0;f+=((Number(ad.food_cost_snapshot)||0)*aq)/(q||1);p+=((Number(ad.pkg_cost_snapshot)||0)*aq)/(q||1);}
        food+=f*q;pkg+=p*q;}
    }
    if(isToday){foodToday+=food;pkgToday+=pkg;conToday+=con;}if(isMonth){foodMonth+=food;pkgMonth+=pkg;conMonth+=con;}}
  const cogsToday=foodToday+pkgToday+conToday,cogsMonth=foodMonth+pkgMonth+conMonth;
  const gpToday=t.sales-cogsToday,fcToday=t.sales>0?Math.round(foodToday/t.sales*100):0;
  const gpMonth=salesMonth-cogsMonth,fcMonth=salesMonth>0?Math.round(foodMonth/salesMonth*100):0;
  const custById=Object.fromEntries(customers.map(c=>[c.id,c]));let newToday=0,returningToday=0;
  for(const id of todayIds){const c=custById[id];if(!c)continue;(c.total_orders||0)<=1?newToday++:returningToday++;}
  const lapsedCount=customers.filter(c=>daysSince(c.last_order_at)>=7).length;
  const cut14=Date.now()-14*DAY,cut7=Date.now()-7*DAY,cut30=Date.now()-30*DAY,qty14={},last7={},prev7={},addon14={},chan={};let s7=0,s30=0;
  for(const o of orders){const tm=new Date(o.ordered_at).getTime(),net=Number(o.net_total)||0;
    if(tm>=cut7)s7+=net;if(tm>=cut30){s30+=net;const k=o.source||"other";(chan[k]||(chan[k]={count:0,sales:0}));chan[k].count++;chan[k].sales+=net;}
    for(const it of o.order_items||[]){const q=Number(it.quantity)||0;if(tm>=cut14)qty14[it.item_name]=(qty14[it.item_name]||0)+q;if(tm>=cut7)last7[it.item_name]=(last7[it.item_name]||0)+q;else if(tm>=cut14)prev7[it.item_name]=(prev7[it.item_name]||0)+q;if(tm>=cut14)for(const ad of it.order_item_addons||[])addon14[ad.name]=(addon14[ad.name]||0)+(Number(ad.quantity)||0);}}
  const sortTop=o=>Object.entries(o).map(([name,qty])=>({name,qty})).sort((a,b)=>b.qty-a.qty);
  const topMenus=sortTop(qty14),topAddons=sortTop(addon14),topMenu=topMenus[0]||null,topAddon=topAddons[0]||null;
  let falling=null;for(const[n,p]of Object.entries(prev7)){const l=last7[n]||0;if(p>=5&&l<p*0.5){const drop=p-l;if(!falling||drop>falling.drop)falling={name:n,prev:p,last:l,drop};}}
  const channels=Object.entries(chan).map(([src,v])=>({src,...v})).sort((a,b)=>b.sales-a.sales);
  const new30=customers.filter(c=>c.created_at&&new Date(c.created_at).getTime()>=cut30).length;
  const repeatCount=customers.filter(c=>(c.total_orders||0)>=2).length;
  const menuName=Object.fromEntries(data.menu.map(m=>[m.id,m.name]));
  let vipLost=null;for(const c of customers){const ds=daysSince(c.last_order_at);if((c.total_orders||0)>=5&&ds>=7){if(!vipLost||Number(c.total_spent)>Number(vipLost.total_spent))vipLost={...c,days:ds,fav:menuName[c.favorite_item_id]};}}
  let newCust=null;for(const c of customers){if((c.total_orders||0)===1&&daysSince(c.last_order_at)<=2){if(!newCust||new Date(c.last_order_at)>new Date(newCust.last_order_at))newCust=c;}}
  const ins=[];
  if(vipLost)ins.push({tone:"alert",icon:"⚠️",title:`${vipLost.name} หายไป ${vipLost.days} วัน`,body:`ลูกค้า VIP — ซื้อ ${vipLost.total_orders} ครั้ง รวม ${fmtTHB(vipLost.total_spent)}${vipLost.fav?` · ชอบ ${vipLost.fav}`:""}`,go:"ดูลูกค้า / เปิดออเดอร์",action:{type:"customer",cid:vipLost.id}});
  if(deltaY!==null&&deltaY<0)ins.push({tone:"warn",icon:"📉",title:`วันนี้ยอดต่ำกว่าเมื่อวาน ${Math.abs(deltaY)}%`,body:`วันนี้ ${fmtTHB(t.sales)} · เมื่อวาน ${fmtTHB(y.sales)}`,go:"ไปจัดการเมนู",action:{type:"menu"}});
  if(falling)ins.push({tone:"warn",icon:"🍽️",title:`เมนู ${falling.name} ยอดตก`,body:`7 วันก่อน ${falling.prev} จาน เหลือ ${falling.last} จาน`,go:"ไปจัดการเมนู",action:{type:"menu"}});
  if(newCust)ins.push({tone:"good",icon:"✨",title:`ลูกค้าใหม่: ${newCust.name}`,body:"เพิ่งสั่งครั้งแรก — ชวนกลับมาซื้อซ้ำ",go:"ดูลูกค้า",action:{type:"customer",cid:newCust.id}});
  if(topMenu)ins.push({tone:"good",icon:"🔥",title:`ดันเมนู ${topMenu.name}`,body:`ขายดีสุด ${topMenu.qty} จาน/14 วัน`,go:"ไปจัดการเมนู",action:{type:"menu"}});
  if(!ins.length)ins.push({tone:"good",icon:"✅",title:"วันนี้ยังไม่มีเรื่องด่วน",body:"ทุกอย่างปกติดี",go:null,action:null});
  return {today:t,avgBill,deltaY,deltaW,spark,cogsToday,gpToday,fcToday,foodToday,pkgToday,conToday,salesMonth,cogsMonth,gpMonth,fcMonth,foodMonth,pkgMonth,conMonth,newToday,returningToday,lapsedCount,topMenu,falling,topAddon,s7,s30,channels,new30,repeatCount,topMenus,topAddons,insights:ins.slice(0,4)};
}

    let html=filtered.map(it=>`<button class="pickitem2" data-pk="${esc(String(it.id))}"><span>${esc(it.label)}</span>${it.sub?`<span class="q" style="color:var(--slate);font-size:13px">${esc(it.sub)}</span>`:""}</button>`).join("");

    listEl.innerHTML=html;

function stepperHTML(id,value,opts){opts=opts||{};const step=opts.step||1;const min=opts.min!=null?opts.min:0;const cls=opts.cls||"nin";const sm=opts.sm?" sm":"";const ph=opts.placeholder!=null?opts.placeholder:"";
  return `<div class="stpr${sm}" data-stpr data-step="${step}" data-min="${min===null?"":min}"><button type="button" data-sdir="-1">−</button><input id="${id}" class="${cls}" inputmode="decimal" value="${value!=null&&value!==""?value:""}" placeholder="${ph}"/><button type="button" data-sdir="1">＋</button></div>`;}
function bindSteppers(root){root=root||document;(root.querySelectorAll?root.querySelectorAll("[data-stpr]"):[]).forEach(w=>{
  if(w._bound)return;w._bound=1;
  const inp=w.querySelector("input"),step=parseFloat(w.dataset.step)||1,min=w.dataset.min===""?null:parseFloat(w.dataset.min);
  const dec=(String(step).indexOf(".")>=0)?String(step).split(".")[1].length:0;
  const fix=v=>{const f=Math.pow(10,dec);return Math.round(v*f)/f;};
  const bump=dir=>{let cur=parseFloat(inp.value);if(isNaN(cur))cur=0;let nv=fix(cur+dir*step);if(min!=null&&nv<min)nv=min;inp.value=dec>0?nv.toFixed(dec):String(nv);inp.dispatchEvent(new Event("input",{bubbles:true}));};
  w.querySelectorAll("[data-sdir]").forEach(btn=>{const dir=+btn.dataset.sdir;let to,iv;
    const start=e=>{if(e.cancelable)e.preventDefault();bump(dir);to=setTimeout(()=>{iv=setInterval(()=>bump(dir),80);},450);};
    const stop=()=>{clearTimeout(to);clearInterval(iv);};
    btn.addEventListener("touchstart",start,{passive:false});btn.addEventListener("mousedown",start);
    ["touchend","touchcancel","mouseup","mouseleave"].forEach(ev=>btn.addEventListener(ev,stop));
  });
});}

async function openPLDrill(kind,f,t){

  const newTotal=rows.reduce((s,x)=>s+x.newInRange,0),spendTotal=rows.reduce((s,x)=>s+x.spend,0),maxCount=Math.max(1,...rows.map(x=>x.count));
  const labeled=src=>src==="__none"?"ไม่ระบุแหล่งที่มา":(acqLabel(src)||src);
  const withData=rows.filter(x=>x.src!=="__none"&&x.count>0);
  const bestAvg=[...withData].sort((a,b)=>b.avg-a.avg)[0],bestRepeat=[...withData].sort((a,b)=>b.repeatPct-a.repeatPct)[0];
  body.innerHTML=`
    <div class="sec"><div class="grid">
      ${cell("ลูกค้าทั้งหมด",total+" คน")}
      ${cell("ลูกค้าใหม่ในช่วง",newTotal+" คน","ตาม created_at")}
      ${cell("จำนวนช่องทาง",rows.filter(x=>x.src!=="__none").length+" ช่อง")}
      ${cell("ยอดซื้อรวมสะสม",fmtTHB(spendTotal))}
    </div></div>
    <div class="sec"><div class="sectitle">ลูกค้าตามช่องทาง (Customer Source)</div><div class="block">
      ${rows.length?rows.map(x=>`<div style="margin-bottom:13px"><div class="row"><span>${labeled(x.src)}</span><b class="tnum">${x.count} คน · ${x.pct}%</b></div><div style="height:7px;border-radius:99px;background:#eee;margin-top:4px;overflow:hidden"><div style="height:100%;width:${Math.round(x.count/maxCount*100)}%;background:${x.src==="__none"?"#bbb":BRAND.orange}"></div></div><div class="cmeta" style="margin-top:4px">ใหม่ในช่วง ${x.newInRange} · ซื้อซ้ำ ${x.repeat} (${x.repeatPct}%) · ยอดสะสม ${fmtTHB(x.spend)} · เฉลี่ย/คน ${fmtTHB(x.avg)}</div></div>`).join(""):`<div class="cmeta">ยังไม่มีข้อมูลแหล่งที่มา — ไปตั้งในหน้าแก้ไขลูกค้า</div>`}
    </div></div>
    ${withData.length?`<div class="sec"><div class="sectitle">⭐ ช่องทางคุณภาพดี</div><div class="block"><div class="costsum">
      <div class="row"><span>💰 เฉลี่ยยอดซื้อ/คน สูงสุด</span><b>${labeled(bestAvg.src)} · ${fmtTHB(bestAvg.avg)}</b></div>
      <div class="row" style="margin-top:6px"><span>🔁 % ซื้อซ้ำ สูงสุด</span><b>${labeled(bestRepeat.src)} · ${bestRepeat.repeatPct}%</b></div>

    </div></div></div>`:""}
    <div style="height:20px"></div>`;
}

function auditVal(field,v){
  if(v==null)return "—";
  if(field==="is_active")return v?"เปิด":"ปิด";
  if(field==="product_type")return (TYPES.find(t=>t[0]===v)||[v,v])[1];
  if(typeof v==="object")return JSON.stringify(v);
  if((field==="price"||field==="cost"||field==="total_price")&&!isNaN(v))return fmtTHB(Number(v));
  if(field==="ingredient_id"||field==="menu_item_id"||field==="addon_id"){const im=ingMap()[v];if(im)return im.name;const mm=menuMap()[v];if(mm)return mm.name;const am=addonMap()[v];if(am)return am.name;return String(v).slice(0,8);}
  return String(v);
}
function auditLabel(log){
  const ch=log.changes||{};
  if(log.action==="UPDATE"){return Object.keys(ch).filter(k=>FIELD_TH[k]||true).map(k=>`${FIELD_TH[k]||k}: <span style="color:var(--slate)">${esc(auditVal(k,ch[k]&&ch[k].old))}</span> → <b>${esc(auditVal(k,ch[k]&&ch[k].new))}</b>`).join("<br>");}
  const name=ch.name||ch.item_name;const parts=[];if(name)parts.push(`<b>${esc(name)}</b>`);
  for(const k of ["price","cost","qty","qty_base","total_price","purchased_at","category"])if(ch[k]!=null)parts.push(`${FIELD_TH[k]||k}: ${esc(auditVal(k,ch[k]))}`);
  return parts.join(" · ")||"(รายการ)";
}

async function renderAuditLog(filter){
  app.innerHTML=`<div class="addwrap"><div class="phead"><button class="iconbtn" id="back">‹</button><div class="ptitle">ประวัติการแก้ไข</div></div>${filter&&filter.title?`<div class="block"><div class="selbox"><b>${esc(filter.title)}</b><div class="cmeta">เฉพาะรายการนี้</div></div></div>`:""}<div id="alist" class="block"><div class="empty">กำลังโหลด…</div></div></div>`;
  document.getElementById("back").onclick=()=>filter&&filter.back?filter.back():renderSettings();
  let logs;try{logs=await fetchAudit(filter&&filter.extra);}catch(e){document.getElementById("alist").innerHTML=`<div class="empty">โหลดไม่สำเร็จ: ${esc(e.message)}</div>`;return;}
  if(!logs.length){document.getElementById("alist").innerHTML=`<div class="empty">ยังไม่มีประวัติการแก้ไข<br>ทุกการ เพิ่ม/แก้/ลบ ตั้งแต่นี้จะถูกบันทึกอัตโนมัติ</div>`;return;}
  document.getElementById("alist").innerHTML=logs.map(log=>{const [aTxt,aCol]=ACT_TH[log.action]||[log.action,"#6B7280"];const time=new Intl.DateTimeFormat("th-TH",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit",timeZone:"Asia/Bangkok"}).format(new Date(log.created_at));return `<div class="selbox" style="margin-bottom:9px"><div class="row"><div><span class="badge" style="background:${aCol}22;color:${aCol}">${aTxt}</span> <b style="font-size:14px">${esc(ENTITY_TH[log.entity]||log.entity)}</b></div><div class="otime">${time}</div></div><div class="cmeta" style="margin-top:6px;line-height:1.6">${auditLabel(log)}</div>${log.reason?`<div style="margin-top:6px"><span class="badge" style="background:#14182B12;color:#14182B">เหตุผล: ${esc(decodeReason(log.reason))}</span></div>`:""}<div class="cmeta" style="margin-top:6px;color:#9aa0ab">โดย ${esc(log.actor_email||"ระบบ")}</div></div>`;}).join("");
}
const CASH_TYPE={cash:"เงินสด",bank:"ธนาคาร",ewallet:"e-Wallet"};
const EXP_TYPE={fixed:"ประจำ",variable:"ผันแปร"};
function feeForSource(src){const t=bkkDate(new Date());const rows=(state.data.feeSettings||[]).filter(f=>f.source===src&&f.active!==false&&String(f.effective_from)<=t);if(rows.length)return rows[0];const c=chBySlug(src);if(c&&(Number(c.default_fee_rate)>0||Number(c.default_fee_vat_rate)>0))return {fee_rate:Number(c.default_fee_rate),fee_vat_rate:Number(c.default_fee_vat_rate),effective_from:null,_fromChannel:true};return null;}
function acctBal(id){const r=(state.data.cashBalance||[]).find(x=>x.account_id===id);return r?Number(r.balance):null;}
function catById(id){return (state.data.expenseCats||[]).find(c=>c.id===id);}
function acctById(id){return (state.data.cashAccounts||[]).find(a=>a.id===id);}
function renderChannels(){
  const app=document.getElementById("app");
  const list=chAll();
  app.innerHTML=`<div class="addwrap"><div class="phead"><button class="iconbtn" id="back">‹</button><div class="ptitle">ช่องทางการขาย</div></div>
    <button class="savebtn" id="addCh" style="margin-bottom:14px">＋ เพิ่มช่องทาง</button>
    <div class="block">${list.length?list.map(c=>`<div class="mmrow"><button class="mmmain" data-ch="${c.id}"><div class="mmname"><span style="display:inline-block;width:10px;height:10px;border-radius:99px;background:${c.color||"#6B7280"};margin-right:7px"></span>${c.logo?esc(c.logo)+" ":""}${esc(c.name)} ${c.active===false?`<span class="badge" style="font-size:10px;background:#c0392b22;color:#c0392b">ปิด</span>`:""}${c.is_default?` <span class="badge" style="font-size:10px;background:#2563EB22;color:#2563EB">ตั้งต้น</span>`:""}</div><div class="mmsub">${c.slug} · GP ${r2(Number(c.default_fee_rate)*100)}% · VAT ${r2(Number(c.default_fee_vat_rate)*100)}%${c.uses_settlement?" · settlement":""}${c.uses_epayment?" · e-payment":""}</div></button><span class="chev">›</span></div>`).join(""):`<div class="cmeta">ยังไม่มีช่องทาง</div>`}</div>
    <div class="cmeta" style="margin-top:12px">💡 slug = รหัสภายในที่ระบบใช้ผูกข้อมูล (ห้ามซ้ำ/เปลี่ยนหลังมีออเดอร์แล้ว) · เปลี่ยนชื่อ/สี/โลโก้ได้เสมอ · GP/VAT ที่นี่เป็นค่าเริ่มต้น (fallback) ส่วนเรตมีผลตามวันที่ตั้งได้ที่ บัญชี/การเงิน</div>
    <div style="height:24px"></div></div>`;
  document.getElementById("back").onclick=renderSettings;
  document.getElementById("addCh").onclick=()=>openChannelSheet();
  document.querySelectorAll("[data-ch]").forEach(b=>b.onclick=()=>openChannelSheet(chAll().find(x=>x.id===b.dataset.ch)));
}
function openChannelSheet(ch){
  const isNew=!ch;
  openSheet(isNew?"เพิ่มช่องทาง":"แก้ไขช่องทาง",`
    ${isNew?`<div class="fhint">slug (รหัสภายใน a–z, ห้ามเว้นวรรค)</div><input id="chSlug" class="nin" style="margin-top:6px" placeholder="เช่น robinhood, foodpanda" value=""/>`:`<div class="cmeta">slug: <b>${esc(ch.slug)}</b> (เปลี่ยนไม่ได้)</div>`}
    <div class="fhint" style="margin-top:10px">ชื่อแสดง</div><input id="chName" class="nin" style="margin-top:6px" placeholder="เช่น Robinhood" value="${ch?esc(ch.name):""}"/>
    <div class="row" style="gap:8px;margin-top:10px"><div style="flex:1"><div class="fhint">สี (hex)</div><input id="chColor" class="nin" style="margin-top:6px" placeholder="#00B14F" value="${ch&&ch.color?esc(ch.color):"#6B7280"}"/></div><div style="flex:1"><div class="fhint">โลโก้ (emoji)</div><input id="chLogo" class="nin" style="margin-top:6px" placeholder="🟢" value="${ch&&ch.logo?esc(ch.logo):""}"/></div></div>
    <div class="row" style="gap:8px;margin-top:10px"><div style="flex:1"><div class="fhint">GP % เริ่มต้น</div><input id="chGp" class="nin" inputmode="decimal" style="margin-top:6px" placeholder="0" value="${ch?r2(Number(ch.default_fee_rate)*100):""}"/></div><div style="flex:1"><div class="fhint">VAT % เริ่มต้น</div><input id="chVat" class="nin" inputmode="decimal" style="margin-top:6px" placeholder="0" value="${ch?r2(Number(ch.default_fee_vat_rate)*100):""}"/></div></div>
    <div class="fhint" style="margin-top:10px">ลำดับการแสดง</div><input id="chSort" class="nin" inputmode="numeric" style="margin-top:6px" placeholder="0" value="${ch?(ch.sort_order||0):""}"/>
    <label style="display:flex;align-items:center;gap:10px;margin-top:12px"><input type="checkbox" id="chSettle" ${ch&&ch.uses_settlement?"checked":""}/> <span>มีรอบโอน/ตรวจ Settlement</span></label>
    <label style="display:flex;align-items:center;gap:10px;margin-top:8px"><input type="checkbox" id="chEpay" ${ch&&ch.uses_epayment?"checked":""}/> <span>รับผ่าน e-payment</span></label>
    <label style="display:flex;align-items:center;gap:10px;margin-top:8px"><input type="checkbox" id="chDefault" ${ch&&ch.is_default?"checked":""}/> <span>เป็นช่องทางตั้งต้น (เช่น หน้าร้าน)</span></label>
    <label style="display:flex;align-items:center;gap:10px;margin-top:8px"><input type="checkbox" id="chActive" ${!ch||ch.active!==false?"checked":""}/> <span>เปิดใช้งาน (แสดงในหน้าออเดอร์)</span></label>
    <button class="savebtn" id="chGo" style="margin-top:14px">${isNew?"เพิ่มช่องทาง":"บันทึก"}</button>
    ${ch&&!ch.is_default?`<button class="ghostbtn" id="chDel" style="margin-top:8px;color:#c0392b">ลบช่องทาง</button>`:""}`);
  document.getElementById("chGo").onclick=async()=>{
    const name=val("chName").trim();if(!name){toast("ใส่ชื่อช่องทาง");return;}
    let slug=ch?ch.slug:(val("chSlug")||"").trim().toLowerCase().replace(/[^a-z0-9_]/g,"");
    if(isNew&&!slug){toast("ใส่ slug (a–z)");return;}
    const body={name,color:(val("chColor").trim()||"#6B7280"),logo:val("chLogo").trim()||null,default_fee_rate:(parseFloat(val("chGp"))||0)/100,default_fee_vat_rate:(parseFloat(val("chVat"))||0)/100,sort_order:parseInt(val("chSort"))||0,uses_settlement:document.getElementById("chSettle").checked,uses_epayment:document.getElementById("chEpay").checked,is_default:document.getElementById("chDefault").checked,active:document.getElementById("chActive").checked};
    const btn=document.getElementById("chGo");btn.disabled=true;btn.textContent="กำลังบันทึก…";
    try{
      if(isNew){await post(state.s,"sales_channels",{store_id:state.data.store.id,slug,...body},"return=minimal");}
      else{await patch(state.s,`sales_channels?id=eq.${ch.id}`,body);}
      await reloadData();closeSheet();toast("บันทึกแล้ว");renderChannels();
    }catch(e){toast(/duplicate|unique/i.test(e.message)?"slug นี้มีอยู่แล้ว":e.message);btn.disabled=false;btn.textContent=isNew?"เพิ่มช่องทาง":"บันทึก";}
  };
  if(ch&&!ch.is_default){document.getElementById("chDel").onclick=async()=>{
    openSheet("ลบช่องทาง",`<div class="cmeta" style="margin-bottom:12px">ลบ “${esc(ch.name)}” — ข้อมูลออเดอร์/รายงานเดิมที่ใช้ slug นี้ยังอยู่ แต่จะไม่มีชื่อ/สีให้แสดง แนะนำ “ปิดใช้งาน” แทนถ้าเคยมีออเดอร์แล้ว</div><button class="delbtn" id="chDelYes">ยืนยันลบ</button><button class="ghostbtn" id="chDelNo" style="margin-top:8px">ยกเลิก</button>`);
    document.getElementById("chDelNo").onclick=()=>openChannelSheet(ch);
    document.getElementById("chDelYes").onclick=async()=>{try{await del(state.s,`sales_channels?id=eq.${ch.id}`);await reloadData();closeSheet();toast("ลบแล้ว");renderChannels();}catch(e){toast(e.message);}};
  };}
}

async function generateRecurringThisMonth(){
  const list=(state.data.recurring||[]).filter(x=>x.active!==false);
  if(!list.length){toast("ไม่มีค่าใช้จ่ายประจำ");return;}
  const now=new Date(),ym=bkkDate(now).slice(0,7);
  openSheet("ลงค่าใช้จ่ายประจำ · "+ym,`
    <div class="cmeta" style="margin-bottom:10px">จะสร้างค่าใช้จ่ายของเดือนนี้จาก template ${list.length} รายการ (ข้ามรายการที่ลงไปแล้วในเดือนนี้)</div>
    <div class="block">${list.map(rc=>{const c=catById(rc.category_id);return `<div class="row" style="margin-top:4px"><span>${esc(rc.name)} <span class="cmeta">${c?esc(c.name):""}</span></span><b class="tnum">${fmtTHB(rc.amount)}</b></div>`;}).join("")}</div>
    <button class="savebtn" id="genGo" style="margin-top:14px">ยืนยันลงค่าใช้จ่าย ${list.length} รายการ</button>`);
  document.getElementById("genGo").onclick=async()=>{
    const btn=document.getElementById("genGo");btn.disabled=true;btn.textContent="กำลังลง…";
    try{
      const existing=await safeRest(state.s,`expenses?select=note,category_id&store_id=eq.${state.data.store.id}&paid_at=gte.${ym}-01T00:00:00%2B07:00&note=like.*[ประจำ]*`);
      const done=new Set((existing||[]).map(e=>e.note));
      const dom=n=>{const d=String(n).padStart(2,"0");return `${ym}-${d}`;};
      const rows=[];const cms=[];let skip=0;
      for(const rc of list){
        const tag=`[ประจำ] ${rc.name}`;
        if(done.has(tag)){skip++;continue;}
        const day=(rc.day_of_month&&rc.day_of_month>=1&&rc.day_of_month<=28)?dom(rc.day_of_month):`${ym}-01`;
        const paid_at=new Date(day+"T12:00:00+07:00").toISOString();
        rows.push({store_id:state.data.store.id,category_id:rc.category_id||null,cash_account_id:rc.cash_account_id||null,amount:rc.amount,source:rc.source||null,paid_at,note:tag});
      }
      if(rows.length){const rs=await post(state.s,"expenses",rows,"return=representation");
        for(let i=0;i<rs.length;i++){const e=rs[i],rc=list.find(x=>`[ประจำ] ${x.name}`===e.note);if(rc&&rc.cash_account_id)cms.push({store_id:state.data.store.id,account_id:rc.cash_account_id,direction:"out",amount:e.amount,kind:"expense",ref_type:"expense",ref_id:e.id,occurred_at:e.paid_at,note:e.note});}
        if(cms.length)await post(state.s,"cash_movements",cms,"return=minimal");
      }
      await reloadData();closeSheet();toast(`ลงแล้ว ${rows.length} รายการ${skip?` · ข้าม ${skip} (ลงแล้ว)`:""}`);renderFinance();
    }catch(e){toast(e.message);btn.disabled=false;btn.textContent="ยืนยันลงค่าใช้จ่าย";}
  };
}

function openResetGate(opts){

    <div class="fhint">อีเมล</div><input id="gEmail" class="nin" style="margin-top:6px" inputmode="email" autocapitalize="off" value="${esc(state.s&&state.s.email||"")}"/>

    <div id="gErr" class="hidden" style="color:#c0392b;font-size:13px;margin-top:8px"></div>

  const chk=()=>{const ok=val("gEmail").trim()&&val("gPass")&&val("gPhrase").trim()===opts.phrase;document.getElementById("gGo").disabled=!ok;};
  ["gEmail","gPass","gPhrase"].forEach(id=>{document.getElementById(id).oninput=chk;});chk();
  document.getElementById("gGo").onclick=async()=>{
    const btn=document.getElementById("gGo"),err=document.getElementById("gErr");err.classList.add("hidden");
    btn.disabled=true;btn.textContent="กำลังยืนยันตัวตน…";

    catch(e){err.textContent=e.message;err.classList.remove("hidden");btn.disabled=false;btn.textContent="ยืนยันและดำเนินการ";}
  };
}

    body.querySelectorAll("[data-restore-o]").forEach(b=>b.onclick=async()=>{b.disabled=true;b.textContent="กำลังกู้คืน…";try{await rpc(state.s,"restore_orders",{p_ids:[b.dataset.restoreO]});await reloadData();toast("กู้คืนออเดอร์แล้ว");showOrders();}catch(e){toast(e.message);b.disabled=false;b.textContent="↩️ กู้คืนออเดอร์นี้";}});
  };
  const showCust=async()=>{
    document.getElementById("tabC").classList.add("on");document.getElementById("tabO").classList.remove("on");
    const body=document.getElementById("archBody");body.innerHTML=`<div class="empty">กำลังโหลด…</div>`;
    const rows=await safeRest(state.s,`customers?select=id,name,phone,archived_at,total_orders,total_spent&store_id=eq.${sid}&archived_at=not.is.null&order=archived_at.desc&limit=200`);
    if(!rows.length){body.innerHTML=`<div class="empty">ไม่มีลูกค้าที่เก็บถาวร</div>`;return;}
    body.innerHTML=rows.map(c=>`<div class="block" style="margin-bottom:8px"><div class="row"><b>${esc(c.name)}</b><span class="cmeta">${c.phone?esc(c.phone):""}</span></div><div class="cmeta" style="margin-top:2px">${c.total_orders||0} ออเดอร์ · ${fmtTHB(c.total_spent||0)}</div><button class="ghostbtn" data-restore-c="${c.id}" style="margin-top:8px">↩️ กู้คืนลูกค้านี้</button></div>`).join("");
    body.querySelectorAll("[data-restore-c]").forEach(b=>b.onclick=async()=>{b.disabled=true;b.textContent="กำลังกู้คืน…";try{await rpc(state.s,"restore_customers",{p_ids:[b.dataset.restoreC]});await reloadData();toast("กู้คืนลูกค้าแล้ว");showCust();}catch(e){toast(e.message);b.disabled=false;b.textContent="↩️ กู้คืนลูกค้านี้";}});

function ingredientsHTML(){

  const rank=i=>{const st=sm[i.id];const oh=st?Number(st.on_hand):0;if(st&&st.low_stock&&oh>0)return 0;if(oh<0)return 1;if(oh===0)return 2;return 3;};
  list.sort((a,b)=>{const r=rank(a)-rank(b);return r!==0?r:String(a.name).localeCompare(String(b.name),"th");});
  if(!list.length)return `<div class="empty">${filt==="__low"?"ไม่มีของใกล้หมด 🎉":filt?"ยังไม่มีรายการในหมวดนี้":"ยังไม่มีวัตถุดิบ/บรรจุภัณฑ์ — กด “＋ รายการ”<br>เช่น หมูสับ (g, อาหาร), กล่องข้าว (ชิ้น, บรรจุภัณฑ์)"}</div>`;

function channelPriceBlock(kind,id){
  const cp=state.data.channelPrices||[];
  const rows=priceChannels().map(([k,l])=>{const r=id?cp.find(p=>p.source===k&&(kind==="menu"?p.menu_item_id===id:p.addon_id===id)):null;const v=(r&&r.price!=null)?Number(r.price):"";return `<div class="row" style="margin-top:8px;align-items:center"><span style="width:110px;font-size:14px">${l}</span><input class="nin" style="margin-top:0;flex:1" id="cp_${k}" inputmode="decimal" placeholder="ใช้ราคาหลัก" value="${v}"/></div>`;}).join("");
  return `<div class="blocktitle">ราคาตามช่องทาง (เว้นว่าง = ใช้ราคาหลัก)</div><div class="block">${rows}<div class="cmeta" style="margin-top:10px">กรอกเฉพาะช่องทางที่ขายคนละราคา เช่น Grab/LINE MAN บวกค่า GP — เว้นว่างจะใช้ราคาหลักด้านบน</div></div>`;
}
async function saveChannelPrices(kind,targetId){
  const col=kind==="menu"?"menu_item_id":"addon_id";
  await del(state.s,`channel_prices?${col}=eq.${targetId}`);
  const rows=[];for(const[k]of priceChannels()){const raw=(val("cp_"+k)||"").trim();if(raw==="")continue;const n=parseFloat(raw);if(!isNaN(n)&&n>0)rows.push({store_id:state.data.store.id,source:k,[col]:targetId,price:n});}
  if(rows.length)await post(state.s,"channel_prices",rows,"return=minimal");
}

async function saveAddon(active){
  const name=val("adName").trim(),price=parseFloat(val("adPrice"))||0;if(!name){toast("ใส่ชื่อ Add-on");return;}

  if(!cats.length&&!menus.length){toast("เลือกอย่างน้อย 1 หมวดหมู่หรือ 1 เมนู");return;}
  const rows=editingRecipe.filter(r=>r.qty>0);

      await del(state.s,`recipe_items?addon_id=eq.${addonId}`);

      await saveChannelPrices("addon",addonId);

    <div class="chips" id="adjRsn" style="margin-top:6px">${(isWaste?["ของเสีย","หมดอายุ","ตกแตก","แบ่งใช้","แถม","อื่น ๆ"]:["นับจริง","ของเสีย","หมดอายุ","แบ่งใช้","แถม","อื่น ๆ"]).map(r=>`<button type="button" class="chip sm" data-rsn="${esc(r)}">${esc(r)}</button>`).join("")}</div>
    <input id="adjNote" class="nin" style="margin-top:8px" placeholder="พิมพ์เพิ่มเองได้ เช่น ${isWaste?"ไข่แตก 3 ฟอง":"นับจริงพบขาด"}"/>
    ${isWaste?`<div class="block" style="margin-top:8px"><div class="row"><span>มูลค่าของเสีย ≈</span><b class="tnum" id="wastePrev" style="color:#c0392b">฿0.00</b></div></div>`:""}
    <div class="cmeta" style="margin-top:8px">${isWaste?"บันทึกเป็นการตัดสต็อกออก (ของเสีย) + เก็บ snapshot ต้นทุน ณ วันที่ทิ้ง":"ระบบจะปรับยอดให้เท่ากับที่นับได้ โดยบันทึกส่วนต่างเป็นการปรับสต็อก — ใช้ตั้งยอดตั้งต้น/แก้ติดลบได้"}</div>
    <button class="savebtn" id="adjGo" style="margin-top:14px">${isWaste?"บันทึกของเสีย":"ปรับยอด"}</button>`);
  if(isWaste){const q=document.getElementById("adjQty"),pv=document.getElementById("wastePrev");if(q&&pv)q.oninput=()=>{const v=Math.abs(parseFloat(q.value)||0);pv.textContent=fmtTHB(v*unitCostNow);};}
  document.querySelectorAll("#adjRsn .chip").forEach(c=>c.onclick=()=>{const n=document.getElementById("adjNote"),r=c.dataset.rsn;document.querySelectorAll("#adjRsn .chip").forEach(x=>x.classList.toggle("active",x===c));if(r==="อื่น ๆ"){n.value="";n.focus();}else{n.value=r;}});
  document.getElementById("adjGo").onclick=async()=>{
    const v=parseFloat(val("adjQty"));if(isNaN(v)){toast("ใส่จำนวน");return;}

    if(isWaste){if(v<=0){toast("จำนวนต้องมากกว่า 0");return;}delta=-Math.abs(v);kind="waste";}

    try{await post(state.s,"stock_movements",{store_id:state.data.store.id,inventory_item_id:ing.id,qty_delta:delta,kind,ref_type:"manual",unit_cost,occurred_at:new Date().toISOString(),note},"return=minimal");await reloadData();closeSheet();toast(isWaste?"บันทึกของเสียแล้ว":"ปรับยอดแล้ว");renderIngredientEdit(state.data.inv.find(i=>i.id===ing.id)||ing);}
    catch(e){toast(e.message);btn.disabled=false;btn.textContent=isWaste?"บันทึกของเสีย":"ปรับยอด";}
  };
}

async function saveProdRecipe(semi,recipe,mode){
  if(!editingProdRecipe.length){toast("เพิ่มวัตถุดิบอย่างน้อย 1 รายการ");return;}
  if(editingProdRecipe.some(r=>!(r.qty>0))){toast("ปริมาณวัตถุดิบต้องมากกว่า 0");return;}
  const stdOut=parseFloat(val("prOut"))||0;if(stdOut<=0){toast("ใส่ผลิตมาตรฐาน/รอบ");return;}
  const output_unit=val("prUnit").trim()||semi.base_unit;
  const yieldPct=val("prYield").trim()!==""?parseFloat(val("prYield")):null;
  const shelf=val("prShelf").trim()!==""?parseInt(val("prShelf")):null;
  const stdInput=editingProdRecipe.reduce((s,r)=>s+Number(r.qty),0);
  const inputIds=editingProdRecipe.map(r=>r.input_item_id);
  const btnId=mode==="edit"?"prSaveEdit":mode==="newver"?"prSaveVer":"prSaveNew";
  const btn=document.getElementById(btnId);if(btn){btn.disabled=true;btn.textContent="กำลังบันทึก…";}
  try{
    // circular guard
    const circ=await rpc(state.s,"check_recipe_circular",{p_output:semi.id,p_inputs:inputIds});
    if(circ===true){toast("สูตรวนลูป (circular) — วัตถุดิบตัวใดตัวหนึ่งใช้สินค้านี้อยู่");if(btn){btn.disabled=false;btn.textContent="บันทึก";}return;}
    const sid=state.data.store.id;
    const baseFields={store_id:sid,output_item_id:semi.id,output_unit,standard_input_qty:stdInput,standard_output_qty:stdOut,standard_yield_pct:yieldPct,shelf_life_days:shelf,active:true};
    let recipeId;
    if(mode==="edit"&&recipe){
      await patch(state.s,`production_recipes?id=eq.${recipe.id}`,baseFields);
      await del(state.s,`production_recipe_items?recipe_id=eq.${recipe.id}`);
      recipeId=recipe.id;
    }else{
      // new version (or v1)
      const existing=recipesFor(semi.id);
      const nextVer=existing.length?Math.max(...existing.map(r=>r.version))+1:1;
      let makeCurrent=true;
      if(mode==="newver"){makeCurrent=confirm("ตั้งเวอร์ชันใหม่นี้เป็นสูตรที่ใช้อยู่ (Current) เลยไหม?\nOK = ใช้เลย · Cancel = เก็บไว้เฉย ๆ");}
      if(makeCurrent&&existing.length){await patch(state.s,`production_recipes?output_item_id=eq.${semi.id}`,{is_current:false});}
      const r=await post(state.s,"production_recipes",{...baseFields,version:nextVer,is_current:makeCurrent},"return=representation");
      recipeId=r[0].id;
    }
    await post(state.s,"production_recipe_items",editingProdRecipe.map(x=>({recipe_id:recipeId,input_item_id:x.input_item_id,qty:x.qty})),"return=minimal");
    await reloadData();
    toast("บันทึกสูตรแล้ว");state.prodTab="recipe";renderProduction();
  }catch(e){toast(e.message);if(btn){btn.disabled=false;btn.textContent="บันทึก";}}
}

async function deleteProdRecipe(semi,recipe){
  try{
    const ord=await safeRest(state.s,`production_orders?select=id&recipe_id=eq.${recipe.id}&limit=1`);
    if(ord.length){toast("สูตรนี้เคยใช้ผลิตแล้ว ลบไม่ได้ (เก็บประวัติ) — ปิดใช้งานหรือสร้างเวอร์ชันใหม่แทน");return;}
    if(!confirm(`ลบสูตร v${recipe.version} ของ "${semi.name}"?`))return;
    await del(state.s,`production_recipe_items?recipe_id=eq.${recipe.id}`);
    await del(state.s,`production_recipes?id=eq.${recipe.id}`);
    // ถ้าสูตรที่ลบเป็น current และยังมีเวอร์ชันอื่น → ตั้งเวอร์ชันล่าสุดที่เหลือเป็น current
    if(recipe.is_current){const rest2=recipesFor(semi.id).filter(r=>r.id!==recipe.id);if(rest2.length){const top=rest2.sort((a,b)=>b.version-a.version)[0];await patch(state.s,`production_recipes?id=eq.${top.id}`,{is_current:true});}}
    await reloadData();toast("ลบสูตรแล้ว");state.prodTab="recipe";renderProduction();
  }catch(e){toast(e.message);}
}

function bkkDateTimeLocal(d){const p=new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Bangkok",year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",hour12:false}).formatToParts(d);const g={};p.forEach(x=>g[x.type]=x.value);return `${g.year}-${g.month}-${g.day}T${g.hour}:${g.minute}`;}

// รวมหน่วยซื้อ: base + BULK(เดิม) + item_purchase_units(ตั้งเอง) → [{unit,factor,isDefault}]
function purchaseUnitOptions(ing){
  const base=ing.base_unit;const out=[{unit:base,factor:1,isDefault:false}];const seen=new Set([base]);
  (BULK[base]||[]).forEach(([u,f])=>{if(!seen.has(u)){out.push({unit:u,factor:f,isDefault:false});seen.add(u);}});
  (state.data.purchaseUnits||[]).filter(p=>p.inventory_item_id===ing.id).forEach(p=>{if(!seen.has(p.unit)){out.push({unit:p.unit,factor:Number(p.factor),isDefault:!!p.is_default});seen.add(p.unit);}else{const e=out.find(x=>x.unit===p.unit);if(e){e.factor=Number(p.factor);e.isDefault=!!p.is_default;}}});
  return out;
}

  const dQty=isEdit?(existing.purchase_qty!=null?Number(existing.purchase_qty):Number(existing.qty_base)):"";

  const rb=document.getElementById("repeatBtn");rb.textContent="กำลังดึงเมนูล่าสุด…";
  try{const items=await fetchLastOrderItems(state.s,state.data.store.id,draft.customer.id),mm=menuMap();draft.cart={};
    for(const it of items){if(!it.menu_item_id)continue;const m=mm[it.menu_item_id];if(m&&m.is_active===false)continue;draft.cart[it.menu_item_id]={name:m?m.name:it.item_name,price:m?priceFor(m,draft.source):Number(it.unit_price),qty:Number(it.quantity)||1,addons:{}};}
    syncMenu();rb.textContent="⟳ ใส่เมนูล่าสุดให้แล้ว";if(!items.length)toast("ลูกค้านี้ยังไม่มีออเดอร์ก่อนหน้า");
  }catch(e){toast(e.message);rb.textContent="⟳ สั่งเหมือนเดิม (เมนูล่าสุด)";}
}
function defaultPackagingLines(){
  const cartMenus=new Set(Object.keys(draft.cart||{}));const out={};
  for(const d of (state.data.pkgDefaults||[])){
    if(d.active===false)continue;
    if(d.source && d.source!==draft.source)continue;
    if(d.menu_item_id && !cartMenus.has(d.menu_item_id))continue;
    out[d.inventory_item_id]=(out[d.inventory_item_id]||0)+Number(d.qty||0);
  }
  return Object.entries(out).map(([item_id,qty])=>({item_id,qty}));
}
function mergePackagingDefaults(){
  if(!draft.packaging)draft.packaging=[];
  if(draft.pkgLoaded)return;
  if(!draft.pkgRemoved)draft.pkgRemoved={};
  const have=new Set(draft.packaging.map(p=>p.item_id));
  for(const line of defaultPackagingLines()){
    if(have.has(line.item_id)||draft.pkgRemoved[line.item_id])continue;
    draft.packaging.push(line);
  }
}
function pkgSaleMonth(){return monthOf(new Date(fromLocalInput(val("orderedAt")||draft.orderedAt)));}
function renderPackaging(){
  const box=document.getElementById("pkgList");if(!box)return;
  const im=ingMap(),mk=pkgSaleMonth();
  const rows=(draft.packaging||[]).map((p,i)=>{const it=im[p.item_id],k=it?(it.kind||"supply"):"supply",cu=ingCostPerUnit(p.item_id,mk);
    return `<div class="recrow"><div class="recname">${esc(it?it.name:"?")} <span class="badge" style="background:${KIND_COLOR[k]}22;color:${KIND_COLOR[k]};font-size:10px">${KIND_TH[k]}</span> <span class="recunit">${esc(it?it.base_unit:"")}</span> · <span class="reccost tnum" id="pc_${i}">฿${fmt2(p.qty*cu)}</span></div><div style="display:flex;align-items:center;gap:6px;margin-top:5px">${stepperHTML("pq_"+i,p.qty,{step:stepForUnit(it?it.base_unit:""),min:0,sm:true})}<button class="xbtn" data-prm="${i}">×</button></div></div>`;}).join("")
    ||`<div class="cmeta">ยังไม่มีบรรจุภัณฑ์/วัสดุ — เลือกช่องทางเพื่อเติมอัตโนมัติ หรือกดเพิ่มด้านล่าง</div>`;
  box.innerHTML=rows;
  (draft.packaging||[]).forEach((p,i)=>{const q=document.getElementById("pq_"+i);if(q)q.oninput=()=>{draft.pkgTouched=true;draft.packaging[i].qty=parseFloat(q.value)||0;const it=im[draft.packaging[i].item_id],cu=ingCostPerUnit(draft.packaging[i].item_id,mk);const c=document.getElementById("pc_"+i);if(c)c.textContent="฿"+fmt2(draft.packaging[i].qty*cu);updateOrderCost();};});
  box.querySelectorAll("[data-prm]").forEach(b=>b.onclick=()=>{draft.pkgTouched=true;const i=+b.dataset.prm,it=draft.packaging[i];if(it){draft.pkgRemoved=draft.pkgRemoved||{};draft.pkgRemoved[it.item_id]=1;draft.packaging.splice(i,1);}renderPackaging();updateOrderCost();});
  bindSteppers(box);
  updateOrderCost();
}
function togglePkgPicker(){
  const box=document.getElementById("pkgPicker");if(!box)return;
  if(box.innerHTML){box.innerHTML="";return;}
  const items=pkgItems();if(!items.length){box.innerHTML=`<div class="cmeta" style="margin-top:8px">ยังไม่มีบรรจุภัณฑ์/วัสดุ — ไปเพิ่มที่ เมนู → ต้นทุน/สต็อก</div>`;return;}
  const used=new Set((draft.packaging||[]).map(p=>p.item_id));
  const groups=["packaging","supply"].map(k=>{const its=items.filter(i=>(i.kind||"supply")===k&&!used.has(i.id));if(!its.length)return "";return `<div class="cmeta" style="margin:6px 4px 2px;font-weight:700;color:${KIND_COLOR[k]}">${KIND_TH[k]}</div>`+its.map(i=>`<button class="pickitem" data-padd="${i.id}">${esc(i.name)} <span class="q" style="color:var(--slate)">(${esc(i.base_unit)})</span></button>`).join("");}).join("");
  box.innerHTML=`<div class="picker">${groups||`<div class="cmeta">เพิ่มครบแล้ว</div>`}</div>`;
  box.querySelectorAll("[data-padd]").forEach(b=>b.onclick=()=>{draft.pkgTouched=true;if(draft.pkgRemoved)delete draft.pkgRemoved[b.dataset.padd];draft.packaging.push({item_id:b.dataset.padd,qty:1});box.innerHTML="";renderPackaging();});
}
function orderFoodCost(mk){let food=0;for(const[id,e]of Object.entries(draft.cart||{})){if(!e.qty)continue;const sp=menuCostSplit(id,mk);let f=sp.food;for(const aid of Object.keys(e.addons||{}))f+=addonCostSplit(aid,mk).food;food+=f*e.qty;}return food;}
function packagingSplit(mk){let pkg=0,con=0;const im=ingMap();for(const p of (draft.packaging||[])){const it=im[p.item_id],k=it?(it.kind||"supply"):"supply",c=Number(p.qty)*ingCostPerUnit(p.item_id,mk);if(k==="packaging")pkg+=c;else con+=c;}return {pkg,con};}
function computeOrderCost(){
  const mk=pkgSaleMonth(),food=orderFoodCost(mk),{pkg,con}=packagingSplit(mk),cogs=food+pkg+con;
  let sales=0;for(const[id,e]of Object.entries(draft.cart||{})){if(!e.qty)continue;const ad=Object.values(e.addons||{}).reduce((x,a)=>x+a.price,0);sales+=(e.price+ad)*e.qty;}
  return {food,pkg,con,cogs,sales,profit:sales-cogs};
}
function updateOrderCost(){
  const bar=document.getElementById("costBarInner");if(!bar)return;
  const c=computeOrderCost();
  bar.innerHTML=`COGS <b class="tnum">${fmtTHB(c.cogs)}</b> · กำไร <b class="tnum" style="color:${c.profit>=0?BRAND.up:"#c0392b"}">${fmtTHB(c.profit)}</b>`;
}
function openCostBreakdown(){
  const c=computeOrderCost();
  openSheet("สรุปต้นทุนออเดอร์",`<div class="block"><div class="costsum">
    <div class="row"><span>ยอดขาย</span><b class="tnum">${fmtTHB(c.sales)}</b></div>
    <div class="row" style="margin-top:6px"><span>ต้นทุนอาหาร (Food)</span><b class="tnum">${fmtTHB(c.food)}</b></div>
    <div class="row" style="margin-top:3px"><span>บรรจุภัณฑ์ (Packaging)</span><b class="tnum">${fmtTHB(c.pkg)}</b></div>
    <div class="row" style="margin-top:3px"><span>วัสดุสิ้นเปลือง (Consumable)</span><b class="tnum">${fmtTHB(c.con)}</b></div>
    <div class="row" style="margin-top:4px;border-top:1px solid #f0d8c8;padding-top:5px"><span>COGS รวม</span><b class="tnum">${fmtTHB(c.cogs)}</b></div>
    <div class="row" style="margin-top:4px"><span>กำไรขั้นต้น</span><b class="tnum" style="color:${c.profit>=0?BRAND.up:"#c0392b"}">${fmtTHB(c.profit)}</b></div>
  </div><div class="cmeta" style="margin-top:8px">กำไรขั้นต้น = ยอดขาย − COGS (ยังไม่หัก GP/ค่าแอป ซึ่งคำนวณตอนบันทึกตามช่องทาง)</div></div>`);
}
function repriceCart(){if(draft.editId)return;const mm=menuMap(),am=addonMap();for(const[id,e]of Object.entries(draft.cart||{})){const m=mm[id];if(m)e.price=priceFor(m,draft.source);for(const aid of Object.keys(e.addons||{})){const a=am[aid];if(a)e.addons[aid].price=addonPriceFor(a,draft.source);}}}
function syncMenu(){
  let total=0,count=0;
  for(const m of state.data.menu){const e=draft.cart[m.id],q=e?e.qty:0;
    const cnt=document.getElementById("cnt_"+m.id);if(cnt)cnt.textContent=q;
    const row=document.getElementById("row_"+m.id);if(row)row.classList.toggle("on",q>0);
    const adbox=document.getElementById("ad_"+m.id);
    if(adbox){const avail=q>0?addonsForMenu(m):[];adbox.innerHTML=avail.map(a=>`<button class="achip ${e&&e.addons[a.id]?"on":""}" data-mid="${m.id}" data-aid="${a.id}">+${esc(a.name)} ฿${Math.round(addonPriceFor(a,draft.source))}</button>`).join("");
      adbox.querySelectorAll(".achip").forEach(ch=>ch.onclick=()=>{const ee=draft.cart[ch.dataset.mid];if(!ee)return;const a=addonMap()[ch.dataset.aid];if(ee.addons[ch.dataset.aid])delete ee.addons[ch.dataset.aid];else ee.addons[ch.dataset.aid]={name:a.name,price:addonPriceFor(a,draft.source)};syncMenu();});}
    if(q>0){const adSum=Object.values(e.addons).reduce((x,a)=>x+a.price,0);total+=(e.price+adSum)*q;count+=q;}
  }
  const btn=document.getElementById("saveBtn"),lbl=document.getElementById("saveLabel"),nbtn=document.getElementById("saveNextBtn");
  if(count>0){btn.disabled=false;lbl.textContent=`${draft.editId?"บันทึกการแก้ไข":"บันทึกออเดอร์"} · ${count} รายการ · ${fmtTHB(total)}`;}else{btn.disabled=true;lbl.textContent="เลือกเมนูก่อน";}
  btn.onclick=()=>saveOrder(false);
  if(nbtn){nbtn.disabled=count<=0;nbtn.onclick=()=>saveOrder(true);}
  mergePackagingDefaults();renderPackaging();
}
function openOrderFinSheet(o,fin){
  const g=k=>fin&&fin[k]!=null?Number(fin[k]):0;
  const line=(key,label,bv,vr)=>`<div class="fhint" style="margin-top:10px">${label}</div>
    <div class="row" style="gap:8px;margin-top:6px"><input id="${key}_bv" class="nin" style="margin-top:0;flex:2" inputmode="decimal" placeholder="ก่อน VAT" value="${bv||""}"/><input id="${key}_vr" class="nin" style="margin-top:0;flex:1" inputmode="decimal" placeholder="VAT%" value="${vr!=null?r2(vr*100):""}"/></div>`;
  openSheet("แก้ไขตัวเลขจากแอป",`
    <div class="block"><div class="row"><span>ยอดขายหน้าระบบ</span><b class="tnum">${fmtTHB(g("gross_sales"))}</b></div></div>
    <div class="fhint" style="margin-top:10px">ส่วนลดสินค้า (item discount)</div><input id="f_item_discount" class="nin" style="margin-top:6px" inputmode="decimal" placeholder="0" value="${g("item_discount")||""}"/>
    ${line("f_pf","GP / Platform Fee",g("platform_fee_before_vat"),g("platform_fee_vat_rate"))}
    ${line("f_mp","Merchant Promo (ร้านร่วมจ่าย)",g("merchant_promo_before_vat"),g("merchant_promo_vat_rate"))}
    ${line("f_cf","Campaign Fee",g("campaign_fee_before_vat"),g("campaign_fee_vat_rate"))}
    ${line("f_cp","Compensation (ชดเชย)",g("compensation_before_vat"),g("compensation_vat_rate"))}
    ${line("f_rf","Refund",g("refund_before_vat"),g("refund_vat_rate"))}
    ${line("f_aj","Adjustment",g("adjustment_before_vat"),g("adjustment_vat_rate"))}
    <div class="block" style="margin-top:12px"><div class="row"><span>รวมค่าใช้จ่ายจากแอป (รวม VAT)</span><b class="tnum" id="fPrevApp" style="color:#c0392b">฿0</b></div><div class="row" style="margin-top:4px"><span>ยอดรับจริงจากแอป</span><b class="tnum" id="fPrevNet" style="color:${BRAND.up}">฿0</b></div></div>
    <button class="savebtn" id="fSave" style="margin-top:14px">บันทึกตัวเลข</button>`);
  const num=id=>parseFloat(val(id))||0;
  const calc=()=>{
    const inc=(bv,vr)=>{const b=num(bv),r=num(vr)/100;return b+r2(b*r);};
    const app=inc("f_pf_bv","f_pf_vr")+inc("f_mp_bv","f_mp_vr")+inc("f_cf_bv","f_cf_vr")+inc("f_cp_bv","f_cp_vr")+inc("f_rf_bv","f_rf_vr")+inc("f_aj_bv","f_aj_vr");
    const net=g("gross_sales")-num("f_item_discount")-app;
    document.getElementById("fPrevApp").textContent=fmtTHB(app);
    document.getElementById("fPrevNet").textContent=fmtTHB(net);
  };
  ["f_item_discount","f_pf_bv","f_pf_vr","f_mp_bv","f_mp_vr","f_cf_bv","f_cf_vr","f_cp_bv","f_cp_vr","f_rf_bv","f_rf_vr","f_aj_bv","f_aj_vr"].forEach(id=>{const el=document.getElementById(id);if(el)el.oninput=calc;});calc();
  document.getElementById("fSave").onclick=async()=>{
    const body={
      item_discount:num("f_item_discount"),
      platform_fee_before_vat:num("f_pf_bv"),platform_fee_vat_rate:num("f_pf_vr")/100,
      merchant_promo_before_vat:num("f_mp_bv"),merchant_promo_vat_rate:num("f_mp_vr")/100,
      campaign_fee_before_vat:num("f_cf_bv"),campaign_fee_vat_rate:num("f_cf_vr")/100,
      compensation_before_vat:num("f_cp_bv"),compensation_vat_rate:num("f_cp_vr")/100,
      refund_before_vat:num("f_rf_bv"),refund_vat_rate:num("f_rf_vr")/100,
      adjustment_before_vat:num("f_aj_bv"),adjustment_vat_rate:num("f_aj_vr")/100
    };
    const btn=document.getElementById("fSave");btn.disabled=true;btn.textContent="กำลังบันทึก…";
    try{await patch(state.s,`order_financials?order_id=eq.${o.id}`,body);await reloadData();closeSheet();toast("บันทึกแล้ว");renderOrderDetail(o.id);}
    catch(e){toast(e.message);btn.disabled=false;btn.textContent="บันทึกตัวเลข";}
  };
}
async function syncOrderFinancials(oid,source,gross,forceRate){
  const store_id=state.data.store.id;
  const ex=await safeRest(state.s,`order_financials?select=order_id,source,platform_fee_rate&order_id=eq.${oid}&limit=1`);
  if(ex&&ex.length){
    const channelChanged=(ex[0].source||"")!==source;
    if(channelChanged||forceRate){
      // ช่องทางเปลี่ยน → คำนวณ GP ใหม่ตามเรตช่องทางใหม่ (คงโปร/ชดเชยที่กรอกมือ)
      const fee=feeForSource(source),rate=fee?Number(fee.fee_rate):0,vat=fee?Number(fee.fee_vat_rate):0;
      await patch(state.s,`order_financials?order_id=eq.${oid}`,{source,gross_sales:gross,platform_fee_rate:rate,platform_fee_vat_rate:vat,platform_fee_before_vat:r2(gross*rate)});
    }else{
      // ช่องทางเดิม (แก้จำนวน/ยอด) → คงเรตเดิม
      const rate=Number(ex[0].platform_fee_rate)||0;
      await patch(state.s,`order_financials?order_id=eq.${oid}`,{gross_sales:gross,platform_fee_before_vat:r2(gross*rate)});
    }
  }else{
    const fee=feeForSource(source),rate=fee?Number(fee.fee_rate):0,vat=fee?Number(fee.fee_vat_rate):0;
    await post(state.s,"order_financials",{order_id:oid,store_id,source,gross_sales:gross,platform_fee_rate:rate,platform_fee_vat_rate:vat,platform_fee_before_vat:r2(gross*rate)},"return=minimal");
  }
}
async function saveOrder(andNext){
  const entries=Object.entries(draft.cart).filter(([id,e])=>e.qty>0);
  if(!entries.length){toast("ยังไม่ได้เลือกเมนู");return;}
  const btn=document.getElementById("saveBtn"),lbl=document.getElementById("saveLabel"),nbtn=document.getElementById("saveNextBtn"),old=lbl?lbl.textContent:"";
  try{
    const store_id=state.data.store.id,orderedAt=fromLocalInput(val("orderedAt")),saleMonth=monthOf(new Date(orderedAt));let customer_id=null;
    if(draft.customer.mode==="existing"){
      if(!draft.customer.id){toast("ค้นหาแล้วเลือกลูกค้า หรือเพิ่มลูกค้าใหม่ก่อน");btn.disabled=false;lbl.textContent=old;return;}
      customer_id=draft.customer.id;
    }else if(draft.customer.mode==="new"||draft.customer.mode==="imported"){
      const name=(val("cfName")||draft.customer.name||"").trim();
      if(!name){toast("ใส่ชื่อลูกค้าก่อนบันทึก");btn.disabled=false;lbl.textContent=old;return;}
      const phone=(val("cfPhone")||draft.customer.phone||"").trim();
      const birthdate=(val("cfBirth")||draft.customer.birthdate||"")||null;
      const note=(val("cfNote")||draft.customer.note||"").trim()||null;
      const customer_type=draft.customer.mode==="imported"?"imported":"new";
      const acquisition_source=selectedAcq("cfAcq")||draft.customer.acq||null;
      let c;try{c=await post(state.s,"customers",{store_id,name,phone:phone||null,birthdate,note,customer_type,acquisition_source},"return=representation");}catch(e){toast("บันทึกลูกค้าไม่สำเร็จ: "+e.message);btn.disabled=false;lbl.textContent=old;return;}
      customer_id=c&&c[0]&&c[0].id;
      if(!customer_id){toast("สร้างลูกค้าไม่สำเร็จ — ยังไม่บันทึกออเดอร์");btn.disabled=false;lbl.textContent=old;return;}
    }else{
      toast("ค้นหาแล้วเลือกลูกค้า หรือเพิ่มลูกค้าใหม่ก่อนบันทึก");btn.disabled=false;lbl.textContent=old;return;
    }
    if(btn)btn.disabled=true;if(nbtn)nbtn.disabled=true;if(lbl)lbl.textContent="กำลังบันทึก…";
    const subtotal=entries.reduce((a,[id,e])=>a+(e.price+Object.values(e.addons).reduce((x,ad)=>x+ad.price,0))*e.qty,0);
    let oid;
    if(draft.editId){oid=draft.editId;await patch(state.s,`orders?id=eq.${oid}`,{customer_id,source:draft.source,ordered_at:orderedAt,subtotal,net_total:subtotal});await del(state.s,`order_items?order_id=eq.${oid}`);}
    else{const sub=jwtSub(state.s.token);const ob={store_id,customer_id,source:draft.source,status:"completed",ordered_at:orderedAt,subtotal,discount:0,net_total:subtotal};if(sub)ob.created_by=sub;const ord=await post(state.s,"orders",ob,"return=representation");oid=ord[0].id;}
    const itemsPayload=entries.map(([id,e])=>{const sp=menuCostSplit(id,saleMonth);return {order_id:oid,store_id,menu_item_id:id,item_name:e.name,unit_price:e.price,quantity:e.qty,line_total:e.price*e.qty,cost_snapshot:r2(sp.total),food_cost_snapshot:r2(sp.food),pkg_cost_snapshot:r2(sp.pkg)};});
    const items=await post(state.s,"order_items",itemsPayload,"return=representation");
    const byMenu={};for(const it of items)byMenu[it.menu_item_id]=it.id;
    const addonRows=[];for(const[id,e]of entries){const oiid=byMenu[id];for(const aid of Object.keys(e.addons)){const ad=e.addons[aid];const sp=addonCostSplit(aid,saleMonth);addonRows.push({order_item_id:oiid,store_id,addon_id:aid,name:ad.name,price:ad.price,quantity:e.qty,food_cost_snapshot:r2(sp.food),pkg_cost_snapshot:r2(sp.pkg)});}}
    if(addonRows.length)await post(state.s,"order_item_addons",addonRows,"return=minimal");
    if(draft.editId)await del(state.s,`order_packaging?order_id=eq.${oid}`);
    const im=ingMap();const pkgRows=(draft.packaging||[]).filter(p=>Number(p.qty)>0).map(p=>{const it=im[p.item_id],k=(it&&it.kind==="packaging")?"packaging":"supply";return {store_id,order_id:oid,inventory_item_id:p.item_id,kind:k,qty:Number(p.qty),unit_cost_snapshot:r2(ingCostPerUnit(p.item_id,saleMonth))};});
    if(pkgRows.length)await post(state.s,"order_packaging",pkgRows,"return=minimal");
    try{await syncOrderFinancials(oid,draft.source,subtotal);}catch(e){/* การเงินไม่ควรทำให้บันทึกออเดอร์ล้ม */}
    await reloadData();
    if(draft.editId){toast("แก้ไขออเดอร์แล้ว");navigate("orders");return;}
    toast("บันทึกออเดอร์แล้ว · "+fmtTHB(subtotal));
    if(andNext){const keepSource=draft.source,keepOrderedAt=draft.orderedAt;draft={editId:null,customer:{mode:"search"},cart:{},source:keepSource,orderedAt:keepOrderedAt};renderAdd();}
    else navigate("dash");
  }catch(e){toast(e.message||"บันทึกไม่สำเร็จ");if(lbl)lbl.textContent=old;syncMenu();}
}

function doLogout(msg){localStorage.removeItem(LS);const s=state.s||{};state.s=null;state.data=null;renderLogin({url:s.url,key:s.key,email:s.email},msg||"");}
(async function(){
  if(!CONFIG_READY()){renderLogin();return;}
  let saved=null;try{saved=JSON.parse(localStorage.getItem(LS)||"null");}catch(e){}
  if(saved&&saved.token){state.s={url:CONFIG.SUPABASE_URL,key:CONFIG.SUPABASE_ANON_KEY,email:saved.email,token:saved.token,refresh:saved.refresh,expiresAt:saved.expiresAt||0};
    try{await reloadData();navigate("dash");return;}
    catch(e){if(e.code===401)localStorage.removeItem(LS);renderLogin({email:saved.email});return;}}
  renderLogin();
})();
</script>
