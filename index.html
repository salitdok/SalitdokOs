<script>
// ===== ตั้งค่าระบบ — แก้ครั้งเดียว (ใส่ค่าของร้านคุณ) =====
const CONFIG={
  SUPABASE_URL:"https://opxnxqrafccrwygtmhyi.supabase.co",
  SUPABASE_ANON_KEY:"sb_publishable_MUlg4CcIMELVfP9wkrtcsw_Hvt-NdNl"
};
const CONFIG_READY=()=>/^https:\/\//.test(CONFIG.SUPABASE_URL)&&!CONFIG.SUPABASE_URL.includes("YOUR-")&&CONFIG.SUPABASE_ANON_KEY.length>20&&!CONFIG.SUPABASE_ANON_KEY.includes("YOUR-");
const BRAND={ink:"#14182B",orange:"#F2691E",up:"#0E9F6E",down:"#E02424",amber:"#F59E0B",slate:"#5B6472"};
const DAY=86400000, LS="salitdok_session";
const SRC=[["manual","หน้าร้าน/กรอกเอง"],["grab","Grab"],["lineman","LINE MAN"],["shopee","Shopee"]];
const SRC_MAP=Object.fromEntries(SRC);
const SRC_COLOR={grab:"#00B14F",lineman:"#06C755",shopee:"#EE4D2D",manual:"#6B7280",other:"#6B7280"};
const TYPES=[["food","อาหาร"],["drink","เครื่องดื่ม"],["addon","Add-on"],["set","ชุดเซ็ต"]];
const UNITS=["g","ml","ฟอง","ชิ้น","portion"];
const BULK={g:[["g",1],["kg",1000]],ml:[["ml",1],["ลิตร",1000]]};
const state={s:null,data:null,view:"dash",prev:"dash",menuSeg:"items",menuFilter:null,aiActions:[]};
let draft=null, editingMenu=null, editingAddon=null, editingRecipe=[], editingIng=null;
const bkkDate=d=>new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Bangkok"}).format(d);
const monthOf=d=>bkkDate(d).slice(0,7);
const fmtTHB=n=>"฿"+Math.round(n||0).toLocaleString("th-TH");
const fmt2=n=>(Math.round((n||0)*100)/100).toLocaleString("th-TH",{maximumFractionDigits:2});
const daysSince=iso=>iso?Math.floor((Date.now()-new Date(iso).getTime())/DAY):Infinity;
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function jwtSub(t){try{return JSON.parse(atob(t.split(".")[1].replace(/-/g,"+").replace(/_/g,"/"))).sub;}catch(e){return null;}}
function toast(m){const el=document.getElementById("toast");el.textContent=m;el.classList.add("show");clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),2500);}
function lastSeen(iso){const d=daysSince(iso);return d===0?"วันนี้":d===1?"เมื่อวาน":isFinite(d)?d+" วันก่อน":"—";}
const val=id=>{const el=document.getElementById(id);return el?el.value:"";};
function toLocalInput(date){const p=new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Bangkok",year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",hour12:false}).formatToParts(date);const g=t=>p.find(x=>x.type===t).value;let h=g("hour");if(h==="24")h="00";return `${g("year")}-${g("month")}-${g("day")}T${h}:${g("minute")}`;}
function fromLocalInput(v){if(!v)return new Date().toISOString();let s=v.length===16?v+":00":v;return s+"+07:00";}
function deltaPill(label,pct){const c=pct===null?"#c9cfdd":(pct<0?"#ff9b9b":"#86e0bd");const t=pct===null?"—":`${pct<0?"▼":"▲"}${Math.abs(pct)}%`;return `<span class="cmppill">${label} <b style="color:${c}">${t}</b></span>`;}

function persistSession(){if(!state.s)return;localStorage.setItem(LS,JSON.stringify({email:state.s.email,token:state.s.token,refresh:state.s.refresh,expiresAt:state.s.expiresAt}));}
function setSession(email,d){state.s={url:CONFIG.SUPABASE_URL,key:CONFIG.SUPABASE_ANON_KEY,email,token:d.access_token,refresh:d.refresh_token,expiresAt:Date.now()+((d.expires_in||3600)*1000)};persistSession();}
async function signIn(email,password){let r;try{r=await fetch(CONFIG.SUPABASE_URL+"/auth/v1/token?grant_type=password",{method:"POST",headers:{apikey:CONFIG.SUPABASE_ANON_KEY,"Content-Type":"application/json"},body:JSON.stringify({email,password})});}catch(e){throw new Error("เครือข่ายเข้าไม่ถึง Supabase — ตรวจการเชื่อมต่อ");}const d=await r.json();if(!r.ok)throw new Error(d.error_description||d.msg||d.error||"อีเมลหรือรหัสผ่านไม่ถูกต้อง");setSession(email,d);}
async function doRefresh(){if(!state.s||!state.s.refresh){const e=new Error("เซสชันหมดอายุ");e.code=401;throw e;}let r;try{r=await fetch(CONFIG.SUPABASE_URL+"/auth/v1/token?grant_type=refresh_token",{method:"POST",headers:{apikey:CONFIG.SUPABASE_ANON_KEY,"Content-Type":"application/json"},body:JSON.stringify({refresh_token:state.s.refresh})});}catch(e){throw new Error("เครือข่ายเข้าไม่ถึง Supabase");}const d=await r.json();if(!r.ok){const e=new Error("เซสชันหมดอายุ");e.code=401;throw e;}state.s.token=d.access_token;state.s.refresh=d.refresh_token||state.s.refresh;state.s.expiresAt=Date.now()+((d.expires_in||3600)*1000);persistSession();}
async function ensureFresh(){if(state.s&&state.s.expiresAt&&Date.now()>state.s.expiresAt-60000)await doRefresh();}
async function rest(s,path){await ensureFresh();const go=()=>fetch(s.url+"/rest/v1/"+path,{headers:{apikey:s.key,Authorization:"Bearer "+s.token}});let r;try{r=await go();}catch(e){throw new Error("เครือข่ายเข้าไม่ถึง Supabase");}if(r.status===401){try{await doRefresh();}catch(_){const e=new Error("เซสชันหมดอายุ");e.code=401;throw e;}try{r=await go();}catch(e){throw new Error("เครือข่ายเข้าไม่ถึง Supabase");}}if(r.status===401){const e=new Error("เซสชันหมดอายุ");e.code=401;throw e;}const d=await r.json();if(!r.ok)throw new Error(d.message||d.hint||"ดึงข้อมูลไม่สำเร็จ");return d;}
async function safeRest(s,path){try{return await rest(s,path);}catch(e){return [];}}
async function send(s,method,path,body,prefer){await ensureFresh();const go=()=>fetch(s.url+"/rest/v1/"+path,{method,headers:{apikey:s.key,Authorization:"Bearer "+s.token,"Content-Type":"application/json",Prefer:prefer||"return=representation"},body:body?JSON.stringify(body):undefined});let r;try{r=await go();}catch(e){throw new Error("เครือข่ายเข้าไม่ถึง Supabase");}if(r.status===401){try{await doRefresh();}catch(_){const e=new Error("เซสชันหมดอายุ");e.code=401;throw e;}try{r=await go();}catch(e){throw new Error("เครือข่ายเข้าไม่ถึง Supabase");}}const t=await r.text();const d=t?JSON.parse(t):null;if(!r.ok)throw new Error((d&&(d.message||d.hint))||"ทำรายการไม่สำเร็จ");return d;}
const post=(s,p,b,pr)=>send(s,"POST",p,b,pr);
const patch=(s,p,b)=>send(s,"PATCH",p,b,"return=minimal");
const del=(s,p)=>send(s,"DELETE",p,null,"return=minimal");

async function loadAll(s){
  const stores=await rest(s,"stores?select=id,name,timezone,settings&limit=1");
  if(!stores.length)throw new Error("ไม่พบร้าน — ล็อกอินด้วย user เจ้าของร้าน");
  const store=stores[0],since=new Date(Date.now()-35*DAY).toISOString();
  let orders;
  try{orders=await rest(s,`orders?select=id,customer_id,source,net_total,ordered_at,order_items(menu_item_id,item_name,quantity,cost_snapshot,order_item_addons(name,quantity))&store_id=eq.${store.id}&status=eq.completed&ordered_at=gte.${since}&order=ordered_at.desc`);}
  catch(e){orders=await rest(s,`orders?select=id,customer_id,source,net_total,ordered_at,order_items(menu_item_id,item_name,quantity,order_item_addons(name,quantity))&store_id=eq.${store.id}&status=eq.completed&ordered_at=gte.${since}&order=ordered_at.desc`);}
  const customers=await rest(s,`customers?select=id,name,phone,total_orders,total_spent,last_order_at,favorite_item_id,created_at&store_id=eq.${store.id}&is_active=eq.true&order=total_spent.desc`);
  const menu=await rest(s,`menu_items?select=id,name,name_en,product_type,price,cost,category,sort_order,is_active&store_id=eq.${store.id}&order=sort_order.asc`);
  const addons=await rest(s,`addons?select=id,name,price,is_active,sort_order&store_id=eq.${store.id}&order=sort_order.asc`);
  const links=await rest(s,`addon_links?select=id,addon_id,menu_item_id,category&store_id=eq.${store.id}`);
  const ingredients=await safeRest(s,`ingredients?select=id,name,base_unit&store_id=eq.${store.id}&order=name.asc`);
  const purchases=await safeRest(s,`ingredient_purchases?select=id,ingredient_id,purchased_at,qty_base,total_price,note&store_id=eq.${store.id}&order=purchased_at.desc`);
  const recipes=await safeRest(s,`recipe_items?select=id,menu_item_id,ingredient_id,qty&store_id=eq.${store.id}`);
  const cats=await safeRest(s,`categories?select=id,name,sort_order,color,is_active&store_id=eq.${store.id}&order=sort_order.asc`);
  return {store,orders,customers,menu,addons,links,ingredients,purchases,recipes,cats};
}

async function fetchLastOrderItems(s,storeId,custId){const rows=await rest(s,`orders?select=ordered_at,order_items(menu_item_id,item_name,unit_price,quantity)&store_id=eq.${storeId}&customer_id=eq.${custId}&status=eq.completed&order=ordered_at.desc&limit=1`);return rows.length?(rows[0].order_items||[]):[];}
async function reloadData(){state.data=await loadAll(state.s);}

const menuMap=()=>Object.fromEntries(state.data.menu.map(m=>[m.id,m]));
const addonMap=()=>Object.fromEntries(state.data.addons.map(a=>[a.id,a]));
const ingMap=()=>Object.fromEntries(state.data.ingredients.map(i=>[i.id,i]));
function allCats(){return (state.data.cats||[]).slice().sort((a,b)=>(a.sort_order-b.sort_order)||String(a.name).localeCompare(b.name));}
function categories(){const act=allCats().filter(c=>c.is_active!==false).map(c=>c.name);const set=new Set(act);for(const m of state.data.menu){if(m.category&&!set.has(m.category)){set.add(m.category);act.push(m.category);}}return act;}
function catColor(name){const c=allCats().find(x=>x.name===name);return c&&c.color?c.color:"#9AA3B2";}
function catOptions(selected){const names=categories();const set=new Set(names);const extra=selected&&!set.has(selected)?[selected]:[];return `<option value="">— ไม่ระบุหมวด —</option>`+[...names,...extra].map(n=>`<option value="${esc(n)}"${n===selected?" selected":""}>${esc(n)}</option>`).join("");}
function addonsForMenu(m){const ids=new Set();for(const l of state.data.links){if(l.menu_item_id===m.id||(l.category&&l.category===m.category))ids.add(l.addon_id);}return state.data.addons.filter(a=>a.is_active!==false&&ids.has(a.id));}

function ingCostPerUnit(ingId,mkey){
  const ps=state.data.purchases.filter(p=>p.ingredient_id===ingId);
  let sp=0,sq=0;for(const p of ps)if(String(p.purchased_at).slice(0,7)===mkey){sp+=Number(p.total_price);sq+=Number(p.qty_base);}
  if(sq>0)return sp/sq;
  let latest=null;for(const p of ps){if(!latest||String(p.purchased_at)>String(latest.purchased_at))latest=p;}
  return latest&&Number(latest.qty_base)>0?Number(latest.total_price)/Number(latest.qty_base):0;
}
const recipeRowsFor=menuId=>state.data.recipes.filter(r=>r.menu_item_id===menuId);
function costOfRows(rows,mkey){let c=0;for(const r of rows)c+=Number(r.qty)*ingCostPerUnit(r.ingredient_id,mkey);return c;}
function recipeCost(menuId,mkey){return costOfRows(recipeRowsFor(menuId).map(r=>({ingredient_id:r.ingredient_id,qty:Number(r.qty)})),mkey);}
function unitCostSnapshot(menuId,saleMonth){const mm=menuMap()[menuId];if(recipeRowsFor(menuId).length)return Math.round(recipeCost(menuId,saleMonth)*100)/100;return (mm&&mm.cost!=null&&mm.cost!=="")?Number(mm.cost):0;}

function computeFacts(data){
  const {orders,customers}=data;
  const today=bkkDate(new Date()),yest=bkkDate(new Date(Date.now()-DAY)),wago=bkkDate(new Date(Date.now()-7*DAY)),curMonth=monthOf(new Date());
  const byDay={};for(const o of orders){const d=bkkDate(new Date(o.ordered_at));(byDay[d]||(byDay[d]={sales:0,count:0}));byDay[d].sales+=Number(o.net_total)||0;byDay[d].count+=1;}
  const t=byDay[today]||{sales:0,count:0},y=byDay[yest]||{sales:0,count:0},w=byDay[wago]||{sales:0,count:0};
  const dPct=(a,b)=>b>0?Math.round((a-b)/b*100):null;
  const deltaY=dPct(t.sales,y.sales),deltaW=dPct(t.sales,w.sales),avgBill=t.count?t.sales/t.count:0;
  const spark=[];for(let i=6;i>=0;i--){const d=bkkDate(new Date(Date.now()-i*DAY));spark.push({d,sales:(byDay[d]&&byDay[d].sales)||0,isToday:d===today});}
  let cogsToday=0,cogsMonth=0,salesMonth=0;const todayIds=new Set();
  for(const o of orders){const dk=bkkDate(new Date(o.ordered_at)),mk=dk.slice(0,7),isToday=dk===today,isMonth=mk===curMonth;
    if(isMonth)salesMonth+=Number(o.net_total)||0;if(isToday&&o.customer_id)todayIds.add(o.customer_id);
    for(const it of o.order_items||[]){const c=(Number(it.cost_snapshot)||0)*(Number(it.quantity)||0);if(isToday)cogsToday+=c;if(isMonth)cogsMonth+=c;}}
  const gpToday=t.sales-cogsToday,fcToday=t.sales>0?Math.round(cogsToday/t.sales*100):0;
  const gpMonth=salesMonth-cogsMonth,fcMonth=salesMonth>0?Math.round(cogsMonth/salesMonth*100):0;
  const custById=Object.fromEntries(customers.map(c=>[c.id,c]));let newToday=0,returningToday=0;
  for(const id of todayIds){const c=custById[id];if(!c)continue;(c.total_orders||0)<=1?newToday++:returningToday++;}
  const lapsedCount=customers.filter(c=>daysSince(c.last_order_at)>=7).length;
  const cut14=Date.now()-14*DAY,cut7=Date.now()-7*DAY,cut30=Date.now()-30*DAY,qty14={},last7={},prev7={},addon14={},chan={};let s7=0,s30=0;
  for(const o of orders){const tm=new Date(o.ordered_at).getTime(),net=Number(o.net_total)||0;
    if(tm>=cut7)s7+=net;if(tm>=cut30){s30+=net;const k=o.source||"other";(chan[k]||(chan[k]={count:0,sales:0}));chan[k].count++;chan[k].sales+=net;}
    for(const it of o.order_items||[]){const q=Number(it.quantity)||0;if(tm>=cut14)qty14[it.item_name]=(qty14[it.item_name]||0)+q;if(tm>=cut7)last7[it.item_name]=(last7[it.item_name]||0)+q;else if(tm>=cut14)prev7[it.item_name]=(prev7[it.item_name]||0)+q;if(tm>=cut14)for(const ad of it.order_item_addons||[])addon14[ad.name]=(addon14[ad.name]||0)+(Number(ad.quantity)||0);}}
  const sortTop=o=>Object.entries(o).map(([name,qty])=>({name,qty})).sort((a,b)=>b.qty-a.qty);
  const topMenus=sortTop(qty14),topAddons=sortTop(addon14),topMenu=topMenus[0]||null,topAddon=topAddons[0]||null;
  let falling=null;for(const[n,p]of Object.entries(prev7)){const l=last7[n]||0;if(p>=5&&l<p*0.5){const drop=p-l;if(!falling||drop>falling.drop)falling={name:n,prev:p,last:l,drop};}}
  const channels=Object.entries(chan).map(([src,v])=>({src,...v})).sort((a,b)=>b.sales-a.sales);
  const new30=customers.filter(c=>c.created_at&&new Date(c.created_at).getTime()>=cut30).length;
  const repeatCount=customers.filter(c=>(c.total_orders||0)>=2).length;
  const menuName=Object.fromEntries(data.menu.map(m=>[m.id,m.name]));
  let vipLost=null;for(const c of customers){const ds=daysSince(c.last_order_at);if((c.total_orders||0)>=5&&ds>=7){if(!vipLost||Number(c.total_spent)>Number(vipLost.total_spent))vipLost={...c,days:ds,fav:menuName[c.favorite_item_id]};}}
  let newCust=null;for(const c of customers){if((c.total_orders||0)===1&&daysSince(c.last_order_at)<=2){if(!newCust||new Date(c.last_order_at)>new Date(newCust.last_order_at))newCust=c;}}
  const ins=[];
  if(vipLost)ins.push({tone:"alert",icon:"⚠️",title:`${vipLost.name} หายไป ${vipLost.days} วัน`,body:`ลูกค้า VIP — ซื้อ ${vipLost.total_orders} ครั้ง รวม ${fmtTHB(vipLost.total_spent)}${vipLost.fav?` · ชอบ ${vipLost.fav}`:""}`,go:"ดูลูกค้า / เปิดออเดอร์",action:{type:"customer",cid:vipLost.id}});
  if(deltaY!==null&&deltaY<0)ins.push({tone:"warn",icon:"📉",title:`วันนี้ยอดต่ำกว่าเมื่อวาน ${Math.abs(deltaY)}%`,body:`วันนี้ ${fmtTHB(t.sales)} · เมื่อวาน ${fmtTHB(y.sales)}`,go:"ไปจัดการเมนู",action:{type:"menu"}});
  if(falling)ins.push({tone:"warn",icon:"🍽️",title:`เมนู ${falling.name} ยอดตก`,body:`7 วันก่อน ${falling.prev} จาน เหลือ ${falling.last} จาน`,go:"ไปจัดการเมนู",action:{type:"menu"}});
  if(newCust)ins.push({tone:"good",icon:"✨",title:`ลูกค้าใหม่: ${newCust.name}`,body:"เพิ่งสั่งครั้งแรก — ชวนกลับมาซื้อซ้ำ",go:"ดูลูกค้า",action:{type:"customer",cid:newCust.id}});
  if(topMenu)ins.push({tone:"good",icon:"🔥",title:`ดันเมนู ${topMenu.name}`,body:`ขายดีสุด ${topMenu.qty} จาน/14 วัน`,go:"ไปจัดการเมนู",action:{type:"menu"}});
  if(!ins.length)ins.push({tone:"good",icon:"✅",title:"วันนี้ยังไม่มีเรื่องด่วน",body:"ทุกอย่างปกติดี",go:null,action:null});
  return {today:t,avgBill,deltaY,deltaW,spark,cogsToday,gpToday,fcToday,salesMonth,cogsMonth,gpMonth,fcMonth,newToday,returningToday,lapsedCount,topMenu,falling,topAddon,s7,s30,channels,new30,repeatCount,topMenus,topAddons,insights:ins.slice(0,4)};
}

async function saveCategory(c,getColor,getActive){

async function deleteCategory(c){

  const baseUnit=ing?ing.base_unit:"g";
  const purchases=ing?state.data.purchases.filter(p=>p.ingredient_id===ing.id).slice(0,12):[];
  const avg=ing?ingCostPerUnit(ing.id,cur):0;
  app.innerHTML=`<div class="addwrap"><div class="phead"><button class="iconbtn" id="back">‹</button><div class="ptitle">${isNew?"เพิ่มวัตถุดิบ":"แก้ไขวัตถุดิบ"}</div></div>
    <div class="block"><input id="igName" class="nin" placeholder="ชื่อวัตถุดิบ เช่น หมูสับ" value="${esc(ing?ing.name:"")}" autocapitalize="words"/>
      <div class="fhint" style="margin-top:12px">หน่วยที่ใช้ในสูตร</div>
      <div class="chips" id="unitChips" style="margin-top:6px">${UNITS.map(u=>`<button class="chip sm ${u===baseUnit?"active":""}" data-unit="${u}">${u}</button>`).join("")}</div></div>
    ${ing?`<div class="block"><div class="costsum">ต้นทุนเฉลี่ยเดือนนี้ ≈ <b>${avg>0?"฿"+fmt2(avg)+"/"+esc(ing.base_unit):"ยังไม่มีข้อมูลซื้อ"}</b></div></div>
    <div class="blocktitle">ประวัติการซื้อ</div>
    <div class="block"><button class="ghostbtn" id="addPur" style="margin-top:0">＋ บันทึกการซื้อ</button>
      ${purchases.length?purchases.map(p=>`<button class="mres" data-pur="${p.id}" style="margin-top:8px"><div class="row"><div class="recname">${esc(String(p.purchased_at))}</div><div class="tnum" style="font-weight:700">${fmtTHB(p.total_price)}</div></div><div class="cmeta" style="margin-top:3px">${fmt2(p.qty_base)} ${esc(ing.base_unit)} · ฿${fmt2(Number(p.total_price)/Number(p.qty_base||1))}/${esc(ing.base_unit)}${p.note?` · ${esc(p.note)}`:""} <span style="color:${BRAND.orange};font-weight:700">แก้ไข ›</span></div></button>`).join(""):`<div class="cmeta" style="margin-top:8px">ยังไม่มีการซื้อ</div>`}</div>`:`<div class="block"><div class="cmeta">บันทึกชื่อ+หน่วยก่อน แล้วค่อยบันทึกการซื้อเพื่อให้ระบบคำนวณราคาเฉลี่ย</div></div>`}
    <div style="height:90px"></div>
    <div class="savebar"><button class="savebtn" id="save">${isNew?"เพิ่มวัตถุดิบ":"บันทึก"}</button>${!isNew?`<button class="delbtn" id="del">ลบวัตถุดิบนี้</button>`:""}</div></div>`;
  document.getElementById("back").onclick=()=>renderMenu();
  document.querySelectorAll("#unitChips .chip").forEach(c=>c.onclick=()=>document.querySelectorAll("#unitChips .chip").forEach(x=>x.classList.toggle("active",x===c)));
  document.getElementById("save").onclick=saveIngredient;
  if(ing){document.getElementById("addPur").onclick=()=>renderPurchase(ing);document.getElementById("del").onclick=()=>deleteIngredient(ing);document.querySelectorAll("[data-pur]").forEach(b=>b.onclick=()=>renderPurchase(ing,state.data.purchases.find(p=>p.id===b.dataset.pur)));}
}
async function saveIngredient(){
  const name=val("igName").trim();if(!name){toast("ใส่ชื่อวัตถุดิบ");return;}
  const uc=document.querySelector("#unitChips .chip.active");const base_unit=uc?uc.dataset.unit:"g";
  const btn=document.getElementById("save");btn.disabled=true;btn.textContent="กำลังบันทึก…";
  try{if(editingIng){await patch(state.s,`ingredients?id=eq.${editingIng.id}`,{name,base_unit});await reloadData();renderMenu();toast("บันทึกแล้ว");}else{const r=await post(state.s,"ingredients",{store_id:state.data.store.id,name,base_unit},"return=representation");await reloadData();renderIngredientEdit(state.data.ingredients.find(i=>i.id===r[0].id));toast("เพิ่มวัตถุดิบแล้ว — บันทึกการซื้อต่อได้เลย");}}catch(e){toast(e.message);btn.disabled=false;btn.textContent="บันทึก";}
}
async function deleteIngredient(ing){try{const used=await rest(state.s,`recipe_items?select=id&ingredient_id=eq.${ing.id}&limit=1`);if(used.length){toast("วัตถุดิบนี้ถูกใช้ในสูตรเมนู — เอาออกจากสูตรก่อน");return;}await del(state.s,`ingredient_purchases?ingredient_id=eq.${ing.id}`);await del(state.s,`ingredients?id=eq.${ing.id}`);await reloadData();renderMenu();toast("ลบวัตถุดิบแล้ว");}catch(e){toast(e.message);}}
function renderPurchase(ing,existing){
  const isEdit=!!existing;const units=BULK[ing.base_unit]||[[ing.base_unit,1]];
  const dDate=isEdit?String(existing.purchased_at).slice(0,10):bkkDate(new Date());
  const dQty=isEdit?Number(existing.qty_base):"";
  const dTotal=isEdit?Number(existing.total_price):"";
  const dNote=isEdit&&existing.note?existing.note:"";
  app.innerHTML=`<div class="addwrap"><div class="phead"><button class="iconbtn" id="back">‹</button><div class="ptitle">${isEdit?"แก้ไขการซื้อ":"บันทึกการซื้อ"}</div></div>
    <div class="block"><div class="selbox"><b>${esc(ing.name)}</b><div class="cmeta">หน่วยในสูตร: ${esc(ing.base_unit)}${isEdit?" · จำนวนที่กรอกคิดเป็นหน่วยฐาน":""}</div></div>
      <div class="fhint" style="margin-top:12px">วันที่ซื้อ</div><input type="date" id="puDate" class="nin" style="margin-top:6px" value="${dDate}"/>
      <div class="fhint" style="margin-top:12px">ปริมาณที่ซื้อ</div>
      <div style="display:flex;gap:8px;margin-top:6px"><input id="puQty" class="nin" style="margin-top:0;flex:1" inputmode="decimal" placeholder="เช่น 1" value="${dQty}"/><select id="puUnit" class="nin" style="margin-top:0;width:110px">${units.map(([u])=>`<option value="${u}"${isEdit&&u===ing.base_unit?" selected":""}>${u}</option>`).join("")}</select></div>
      <input id="puTotal" class="nin" inputmode="decimal" placeholder="ราคารวมที่จ่าย (บาท) เช่น 160" value="${dTotal}"/>
      <input id="puNote" class="nin" placeholder="หมายเหตุ (ถ้ามี) เช่น ตลาดเช้า / ล็อตพิเศษ" value="${esc(dNote)}"/>
      <div class="costsum" id="puPreview" style="margin-top:10px"></div></div>
    <div style="height:90px"></div><div class="savebar"><button class="savebtn" id="save">${isEdit?"บันทึกการแก้ไข":"บันทึกการซื้อ"}</button>${isEdit?`<button class="delbtn" id="delPur">ลบรายการซื้อนี้</button>`:""}</div></div>`;
  document.getElementById("back").onclick=()=>renderIngredientEdit(state.data.ingredients.find(i=>i.id===ing.id));
  const upd=()=>{const q=parseFloat(val("puQty"))||0,tot=parseFloat(val("puTotal"))||0,f=(BULK[ing.base_unit]||[[ing.base_unit,1]]).find(x=>x[0]===val("puUnit"));const factor=f?f[1]:1;const base=q*factor;const el=document.getElementById("puPreview");el.innerHTML=base>0&&tot>0?`= ${fmt2(base)} ${esc(ing.base_unit)} · ต้นทุน ≈ <b>฿${fmt2(tot/base)}/${esc(ing.base_unit)}</b>`:`<span class="cmeta">กรอกปริมาณและราคาเพื่อดูต้นทุน/หน่วย</span>`;};
  ["puQty","puTotal","puUnit"].forEach(id=>{const el=document.getElementById(id);el.oninput=upd;el.onchange=upd;});upd();
  document.getElementById("save").onclick=async()=>{
    const q=parseFloat(val("puQty"))||0,tot=parseFloat(val("puTotal"))||0,date=val("puDate")||bkkDate(new Date()),note=val("puNote").trim()||null;
    const f=(BULK[ing.base_unit]||[[ing.base_unit,1]]).find(x=>x[0]===val("puUnit"));const base=q*(f?f[1]:1);
    if(base<=0||tot<=0){toast("กรอกปริมาณและราคาให้ถูกต้อง");return;}
    const btn=document.getElementById("save");btn.disabled=true;btn.textContent="กำลังบันทึก…";
    try{
      if(isEdit)await patch(state.s,`ingredient_purchases?id=eq.${existing.id}`,{purchased_at:date,qty_base:base,total_price:tot,note});
      else await post(state.s,"ingredient_purchases",{store_id:state.data.store.id,ingredient_id:ing.id,purchased_at:date,qty_base:base,total_price:tot,note},"return=minimal");
      await reloadData();toast(isEdit?"แก้ไขการซื้อแล้ว — คำนวณต้นทุนใหม่แล้ว":"บันทึกการซื้อแล้ว");renderIngredientEdit(state.data.ingredients.find(i=>i.id===ing.id));
    }catch(e){toast(e.message);btn.disabled=false;btn.textContent=isEdit?"บันทึกการแก้ไข":"บันทึกการซื้อ";}
  };
  if(isEdit)document.getElementById("delPur").onclick=()=>{
    const bar=document.querySelector(".savebar");
    bar.innerHTML=`<div class="warnbox" style="margin:0 0 12px">ลบรายการซื้อนี้? (ลบเฉพาะรายการนี้ ไม่ลบวัตถุดิบ) ระบบจะคำนวณต้นทุนเฉลี่ยใหม่ทันที</div><button class="delbtn" id="delYes" style="margin-top:0">ยืนยันลบรายการนี้</button><button class="ghostbtn" id="delNo">ยกเลิก</button>`;
    document.getElementById("delNo").onclick=()=>renderPurchase(ing,state.data.purchases.find(p=>p.id===existing.id));
    document.getElementById("delYes").onclick=async()=>{try{await del(state.s,`ingredient_purchases?id=eq.${existing.id}`);await reloadData();toast("ลบรายการซื้อแล้ว");renderIngredientEdit(state.data.ingredients.find(i=>i.id===ing.id));}catch(e){toast(e.message);}};
  };
}
function openAdd(preCustId){draft={editId:null,customer:{mode:"walkin"},cart:{},source:"manual",orderedAt:toLocalInput(new Date())};if(preCustId){const c=state.data.customers.find(x=>x.id===preCustId);if(c)draft.customer={mode:"existing",id:c.id,name:c.name,c};}renderAdd();}
function openEditOrder(o){
  state.prev="orders";const mm=menuMap(),am=addonMap();
  draft={editId:o.id,source:o.source||"manual",cart:{},orderedAt:toLocalInput(new Date(o.ordered_at)),customer:{mode:"walkin"}};
  if(o.customer_id){const c=state.data.customers.find(x=>x.id===o.customer_id);draft.customer=c?{mode:"existing",id:c.id,name:c.name,c}:{mode:"existing",id:o.customer_id,name:(o.customers&&o.customers.name)||"ลูกค้า",c:{name:(o.customers&&o.customers.name)||"ลูกค้า",total_orders:0,total_spent:0}};}
  for(const it of o.order_items||[]){const m=mm[it.menu_item_id];const addons={};for(const oia of it.order_item_addons||[]){const a=am[oia.addon_id];if(oia.addon_id)addons[oia.addon_id]={name:a?a.name:oia.name,price:a?Number(a.price):Number(oia.price)};}draft.cart[it.menu_item_id]={name:m?m.name:it.item_name,price:m?Number(m.price):Number(it.unit_price),qty:Number(it.quantity)||1,addons};}
  renderAdd();
}

  const menu=state.data.menu.filter(m=>m.is_active!==false),isEdit=!!draft.editId;
  app.innerHTML=`<div class="addwrap"><div class="phead"><button class="iconbtn" id="closeAdd">✕</button><div class="ptitle">${isEdit?"แก้ไขออเดอร์":"เพิ่มออเดอร์"}</div></div>
    <div class="blocktitle">ลูกค้า</div>
    <div class="block"><input id="custSearch" class="searchin" placeholder="พิมพ์ชื่อลูกค้า…" autocapitalize="none"/><div id="custResults" class="miniresults"></div>
      <div class="quickrow"><button class="quick" id="qWalkin">ลูกค้าทั่วไป</button><button class="quick" id="qNew">＋ ลูกค้าใหม่</button></div><div id="custSelected" style="margin-top:10px"></div></div>
    <div class="blocktitle">เมนู</div>

    <div class="blocktitle">เวลาออเดอร์</div>
    <div class="block"><input type="datetime-local" id="orderedAt" class="nin" style="margin-top:0" value="${esc(draft.orderedAt)}"><div class="cmeta" style="margin-top:6px">ปรับย้อนหลังได้ เช่น ใส่ออเดอร์ของวันที่ 1</div></div>
    <div class="blocktitle">ช่องทาง</div>
    <div class="block"><div class="chips" id="srcChips">${SRC.map(([k,l])=>`<button class="chip ${k===draft.source?"active":""}" data-src="${k}">${l}</button>`).join("")}</div></div>
    <div style="height:90px"></div>
    <div class="savebar"><button class="savebtn" id="saveBtn" disabled><span id="saveLabel">เลือกเมนูก่อน</span></button></div></div>`;
  document.getElementById("closeAdd").onclick=()=>navigate(state.prev||"dash");
  document.querySelectorAll("#menuList .step").forEach(b=>b.onclick=()=>{const id=b.dataset.id,dir=+b.dataset.dir,m=state.data.menu.find(x=>x.id===id),cur=draft.cart[id],q=cur?cur.qty:0,next=Math.max(0,q+dir);if(cur){next===0?delete draft.cart[id]:cur.qty=next;}else if(next>0)draft.cart[id]={name:m.name,price:Number(m.price),qty:next,addons:{}};syncMenu();});
  document.querySelectorAll("#srcChips .chip").forEach(c=>c.onclick=()=>{draft.source=c.dataset.src;document.querySelectorAll("#srcChips .chip").forEach(x=>x.classList.toggle("active",x===c));});
  const cs=document.getElementById("custSearch");
  cs.oninput=()=>{const q=cs.value.trim().toLowerCase(),res=document.getElementById("custResults");if(!q){res.innerHTML="";return;}res.innerHTML=state.data.customers.filter(c=>(c.name||"").toLowerCase().includes(q)).slice(0,6).map(c=>`<button class="mres" data-cid="${c.id}"><div class="cname">${esc(c.name)}</div><div class="cmeta">ซื้อ ${c.total_orders||0} ครั้ง · ล่าสุด ${lastSeen(c.last_order_at)}</div></button>`).join("");res.querySelectorAll(".mres").forEach(b=>b.onclick=()=>selectExisting(b.dataset.cid));};
  document.getElementById("qWalkin").onclick=()=>{draft.customer={mode:"walkin"};document.getElementById("custResults").innerHTML="";cs.value="";renderSelected();};
  document.getElementById("qNew").onclick=()=>{draft.customer={mode:"new"};document.getElementById("custResults").innerHTML="";renderSelected(cs.value.trim());};
  renderSelected();syncMenu();
}
function selectExisting(cid){const c=state.data.customers.find(x=>x.id===cid);draft.customer={mode:"existing",id:c.id,name:c.name,c};document.getElementById("custResults").innerHTML="";document.getElementById("custSearch").value="";renderSelected();}
function renderSelected(prefillName=""){
  const box=document.getElementById("custSelected"),cu=draft.customer;
  if(cu.mode==="walkin"){box.innerHTML=`<div class="selbox"><div class="selrow"><div><b>ลูกค้าทั่วไป</b><div class="cmeta">ไม่บันทึกชื่อ</div></div></div></div>`;return;}
  if(cu.mode==="new"){box.innerHTML=`<div class="selbox"><div class="selrow"><b>ลูกค้าใหม่</b></div><input id="newName" class="nin" placeholder="ชื่อลูกค้า" value="${esc(prefillName)}" autocapitalize="words"/><input id="newPhone" class="nin" placeholder="เบอร์โทร (ถ้ามี)" inputmode="tel"/></div>`;return;}
  const c=cu.c,fav=c.favorite_item_id&&menuMap()[c.favorite_item_id]?menuMap()[c.favorite_item_id].name:null;
  box.innerHTML=`<div class="selbox"><div class="selrow"><div><b>${esc(c.name)}</b><div class="cmeta">ซื้อ ${c.total_orders||0} ครั้ง · รวม ${fmtTHB(c.total_spent)} · ล่าสุด ${lastSeen(c.last_order_at)}${fav?` · ชอบ ${esc(fav)}`:""}</div></div><button class="link" id="changeCust">เปลี่ยน</button></div>${(c.total_orders||0)>0?`<button class="repeatbtn" id="repeatBtn">⟳ สั่งเหมือนเดิม (เมนูล่าสุด)</button>`:""}</div>`;
  document.getElementById("changeCust").onclick=()=>{draft.customer={mode:"walkin"};renderSelected();};
  const rb=document.getElementById("repeatBtn");if(rb)rb.onclick=loadRepeat;
}
async function loadRepeat(){
  const rb=document.getElementById("repeatBtn");rb.textContent="กำลังดึงเมนูล่าสุด…";
  try{const items=await fetchLastOrderItems(state.s,state.data.store.id,draft.customer.id),mm=menuMap();draft.cart={};
    for(const it of items){if(!it.menu_item_id)continue;const m=mm[it.menu_item_id];if(m&&m.is_active===false)continue;draft.cart[it.menu_item_id]={name:m?m.name:it.item_name,price:m?Number(m.price):Number(it.unit_price),qty:Number(it.quantity)||1,addons:{}};}
    syncMenu();rb.textContent="⟳ ใส่เมนูล่าสุดให้แล้ว";if(!items.length)toast("ลูกค้านี้ยังไม่มีออเดอร์ก่อนหน้า");
  }catch(e){toast(e.message);rb.textContent="⟳ สั่งเหมือนเดิม (เมนูล่าสุด)";}
}
function syncMenu(){
  let total=0,count=0;
  for(const m of state.data.menu){const e=draft.cart[m.id],q=e?e.qty:0;
    const cnt=document.getElementById("cnt_"+m.id);if(cnt)cnt.textContent=q;
    const row=document.getElementById("row_"+m.id);if(row)row.classList.toggle("on",q>0);
    const adbox=document.getElementById("ad_"+m.id);
    if(adbox){const avail=q>0?addonsForMenu(m):[];adbox.innerHTML=avail.map(a=>`<button class="achip ${e&&e.addons[a.id]?"on":""}" data-mid="${m.id}" data-aid="${a.id}">+${esc(a.name)} ฿${Math.round(a.price)}</button>`).join("");
      adbox.querySelectorAll(".achip").forEach(ch=>ch.onclick=()=>{const ee=draft.cart[ch.dataset.mid];if(!ee)return;const a=addonMap()[ch.dataset.aid];if(ee.addons[ch.dataset.aid])delete ee.addons[ch.dataset.aid];else ee.addons[ch.dataset.aid]={name:a.name,price:Number(a.price)};syncMenu();});}
    if(q>0){const adSum=Object.values(e.addons).reduce((x,a)=>x+a.price,0);total+=(e.price+adSum)*q;count+=q;}
  }
  const btn=document.getElementById("saveBtn"),lbl=document.getElementById("saveLabel");
  if(count>0){btn.disabled=false;lbl.textContent=`${draft.editId?"บันทึกการแก้ไข":"บันทึกออเดอร์"} · ${count} รายการ · ${fmtTHB(total)}`;}else{btn.disabled=true;lbl.textContent="เลือกเมนูก่อน";}
  btn.onclick=saveOrder;
}
async function saveOrder(){
  const entries=Object.entries(draft.cart).filter(([id,e])=>e.qty>0);
  if(!entries.length){toast("ยังไม่ได้เลือกเมนู");return;}
  const btn=document.getElementById("saveBtn"),lbl=document.getElementById("saveLabel"),old=lbl.textContent;btn.disabled=true;lbl.textContent="กำลังบันทึก…";
  try{
    const store_id=state.data.store.id,orderedAt=fromLocalInput(val("orderedAt")),saleMonth=monthOf(new Date(orderedAt));let customer_id=null;
    if(draft.customer.mode==="existing")customer_id=draft.customer.id;
    else if(draft.customer.mode==="new"){const name=val("newName").trim();if(!name){toast("ใส่ชื่อลูกค้า หรือเลือกลูกค้าทั่วไป");btn.disabled=false;lbl.textContent=old;return;}const phone=val("newPhone").trim();const c=await post(state.s,"customers",{store_id,name,phone:phone||null},"return=representation");customer_id=c[0].id;}
    const subtotal=entries.reduce((a,[id,e])=>a+(e.price+Object.values(e.addons).reduce((x,ad)=>x+ad.price,0))*e.qty,0);
    let oid;
    if(draft.editId){oid=draft.editId;await patch(state.s,`orders?id=eq.${oid}`,{customer_id,source:draft.source,ordered_at:orderedAt,subtotal,net_total:subtotal});await del(state.s,`order_items?order_id=eq.${oid}`);}
    else{const sub=jwtSub(state.s.token);const ob={store_id,customer_id,source:draft.source,status:"completed",ordered_at:orderedAt,subtotal,discount:0,net_total:subtotal};if(sub)ob.created_by=sub;const ord=await post(state.s,"orders",ob,"return=representation");oid=ord[0].id;}
    const itemsPayload=entries.map(([id,e])=>({order_id:oid,store_id,menu_item_id:id,item_name:e.name,unit_price:e.price,quantity:e.qty,line_total:e.price*e.qty,cost_snapshot:unitCostSnapshot(id,saleMonth)}));
    const items=await post(state.s,"order_items",itemsPayload,"return=representation");
    const byMenu={};for(const it of items)byMenu[it.menu_item_id]=it.id;
    const addonRows=[];for(const[id,e]of entries){const oiid=byMenu[id];for(const aid of Object.keys(e.addons)){const ad=e.addons[aid];addonRows.push({order_item_id:oiid,store_id,addon_id:aid,name:ad.name,price:ad.price,quantity:e.qty});}}
    if(addonRows.length)await post(state.s,"order_item_addons",addonRows,"return=minimal");
    await reloadData();
    if(draft.editId){toast("แก้ไขออเดอร์แล้ว");navigate("orders");}else{toast("บันทึกออเดอร์แล้ว · "+fmtTHB(subtotal));navigate("dash");}
  }catch(e){toast(e.message||"บันทึกไม่สำเร็จ");btn.disabled=false;lbl.textContent=old;}
}

function doLogout(msg){localStorage.removeItem(LS);const s=state.s||{};state.s=null;state.data=null;renderLogin({url:s.url,key:s.key,email:s.email},msg||"");}
(async function(){
  if(!CONFIG_READY()){renderLogin();return;}
  let saved=null;try{saved=JSON.parse(localStorage.getItem(LS)||"null");}catch(e){}
  if(saved&&saved.token){state.s={url:CONFIG.SUPABASE_URL,key:CONFIG.SUPABASE_ANON_KEY,email:saved.email,token:saved.token,refresh:saved.refresh,expiresAt:saved.expiresAt||0};
    try{await reloadData();navigate("dash");return;}
    catch(e){if(e.code===401)localStorage.removeItem(LS);renderLogin({email:saved.email});return;}}
  renderLogin();
})();
</script>
