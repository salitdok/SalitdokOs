<script>

async function ensureFresh(){if(state.s&&state.s.expiresAt&&Date.now()>state.s.expiresAt-60000)await doRefresh();}
async function rest(s,path){await ensureFresh();const go=()=>fetch(s.url+"/rest/v1/"+path,{headers:{apikey:s.key,Authorization:"Bearer "+s.token}});let r;try{r=await go();}catch(e){throw new Error("เครือข่ายเข้าไม่ถึง Supabase");}if(r.status===401){try{await doRefresh();}catch(_){const e=new Error("เซสชันหมดอายุ");e.code=401;throw e;}try{r=await go();}catch(e){throw new Error("เครือข่ายเข้าไม่ถึง Supabase");}}if(r.status===401){const e=new Error("เซสชันหมดอายุ");e.code=401;throw e;}const d=await r.json();if(!r.ok)throw new Error(d.message||d.hint||"ดึงข้อมูลไม่สำเร็จ");return d;}

async function loadStore(s){
  const stores=await rest(s,"stores?select=id,name,timezone,settings&limit=1");
  if(!stores.length)throw new Error("ไม่พบร้าน — ล็อกอินด้วย user เจ้าของร้าน");
  return stores[0];
}
async function loadOrders(s,storeId,sinceISO){
  const since=sinceISO||new Date(Date.now()-35*DAY).toISOString();
  const q=ext=>`orders?select=id,customer_id,source,net_total,ordered_at,food_cost_snapshot,packaging_cost_snapshot,consumable_cost_snapshot,cogs_snapshot,${ext}&store_id=eq.${storeId}&status=eq.completed&ordered_at=gte.${since}&order=ordered_at.desc`;
  const oxA=q(`order_items(menu_item_id,item_name,quantity,cost_snapshot,food_cost_snapshot,pkg_cost_snapshot,order_item_addons(name,quantity,food_cost_snapshot,pkg_cost_snapshot))`);
  const oxB=q(`order_items(menu_item_id,item_name,quantity,cost_snapshot,order_item_addons(name,quantity))`);
  const oxC=q(`order_items(menu_item_id,item_name,quantity,order_item_addons(name,quantity))`);
  try{return await rest(s,oxA);}catch(e){try{return await rest(s,oxB);}catch(e2){return await rest(s,oxC);}}
}

async function loadMaster(s,storeId){

  const addons=await rest(s,`addons?select=id,name,price,is_active,sort_order&store_id=eq.${storeId}&order=sort_order.asc`);
  const links=await rest(s,`addon_links?select=id,addon_id,menu_item_id,category&store_id=eq.${storeId}`);
  let inv=await safeRest(s,`inventory_items?select=id,name,kind,base_unit&store_id=eq.${storeId}&order=name.asc`);
  if(!inv.length){const ing=await safeRest(s,`ingredients?select=id,name,base_unit&store_id=eq.${storeId}&order=name.asc`);inv=ing.map(i=>({...i,kind:"food"}));}

  const recipes=recRaw.map(r=>({...r,item_id:r.inventory_item_id||r.ingredient_id}));

  const channelPrices=await safeRest(s,`channel_prices?select=id,source,menu_item_id,addon_id,price,active&store_id=eq.${storeId}`);

function loyaltySummary(){
  const st=loyaltyStats(),custs=realCustomers();
  const counts={new:0,regular:0,silver:0,gold:0,platinum:0,vip:0},vip=[],birthdaysSoon=[],lapsed=[],promoted=[],demoting=[];
  for(const c of custs){
    const s=st[c.id]||{s30:0,sPrev30:0},lvl=customerLevel(c,s);counts[lvl]=(counts[lvl]||0)+1;
    if(lvl==="vip")vip.push(c);
    const dtb=daysToBirthday(c.birthdate);if(dtb!=null&&dtb<=14)birthdaysSoon.push({c,dtb});
    const since=daysSince(c.last_order_at);if(isFinite(since)&&since>30&&c.total_orders>0)lapsed.push({c,since});
    if(c.total_orders>0&&!c.vip_manual){const ni=LEVEL_ORDER.indexOf(levelKey(s.s30)),pi=LEVEL_ORDER.indexOf(levelKey(s.sPrev30));
      if(s.s30>0&&ni>pi)promoted.push({c,now:levelKey(s.s30)});

function ingCostPerUnit(itemId,mkey){
  const ps=state.data.purchases.filter(p=>p.item_id===itemId);
  let sp=0,sq=0;for(const p of ps)if(String(p.purchased_at).slice(0,7)===mkey){sp+=Number(p.total_price);sq+=Number(p.qty_base);}
  if(sq>0)return sp/sq;
  let latest=null;for(const p of ps){if(!latest||String(p.purchased_at)>String(latest.purchased_at))latest=p;}
  return latest&&Number(latest.qty_base)>0?Number(latest.total_price)/Number(latest.qty_base):0;
}

function computeFacts(data){
  const orders=data.orders,customers=data.customers.filter(c=>!c.is_guest);
  const today=bkkDate(new Date()),yest=bkkDate(new Date(Date.now()-DAY)),wago=bkkDate(new Date(Date.now()-7*DAY)),curMonth=monthOf(new Date());
  const byDay={};for(const o of orders){const d=bkkDate(new Date(o.ordered_at));(byDay[d]||(byDay[d]={sales:0,count:0}));byDay[d].sales+=Number(o.net_total)||0;byDay[d].count+=1;}
  const t=byDay[today]||{sales:0,count:0},y=byDay[yest]||{sales:0,count:0},w=byDay[wago]||{sales:0,count:0};
  const dPct=(a,b)=>b>0?Math.round((a-b)/b*100):null;

  const spark=[];for(let i=6;i>=0;i--){const d=bkkDate(new Date(Date.now()-i*DAY));spark.push({d,sales:(byDay[d]&&byDay[d].sales)||0,isToday:d===today});}
  let foodToday=0,foodMonth=0,pkgToday=0,pkgMonth=0,conToday=0,conMonth=0,salesMonth=0;const todayIds=new Set();
  for(const o of orders){const dk=bkkDate(new Date(o.ordered_at)),mk=dk.slice(0,7),isToday=dk===today,isMonth=mk===curMonth;
    if(isMonth)salesMonth+=Number(o.net_total)||0;if(isToday&&o.customer_id)todayIds.add(o.customer_id);
    let food=0,pkg=0,con=0,cogs=Number(o.cogs_snapshot)||0;
    if(cogs>0){food=Number(o.food_cost_snapshot)||0;pkg=Number(o.packaging_cost_snapshot)||0;con=Number(o.consumable_cost_snapshot)||0;}
    else{ // fallback ออเดอร์เก่าที่ยังไม่มี rollup — คำนวณจาก snapshot รายบรรทัด (packaging รวมใน pkg)
      for(const it of o.order_items||[]){const q=Number(it.quantity)||0,fs=Number(it.food_cost_snapshot)||0,ps=Number(it.pkg_cost_snapshot)||0,leg=Number(it.cost_snapshot)||0;
        let f=(fs||ps)?fs:leg,p=ps;
        for(const ad of it.order_item_addons||[]){const aq=Number(ad.quantity)||0;f+=((Number(ad.food_cost_snapshot)||0)*aq)/(q||1);p+=((Number(ad.pkg_cost_snapshot)||0)*aq)/(q||1);}
        food+=f*q;pkg+=p*q;}
    }
    if(isToday){foodToday+=food;pkgToday+=pkg;conToday+=con;}if(isMonth){foodMonth+=food;pkgMonth+=pkg;conMonth+=con;}}
  const cogsToday=foodToday+pkgToday+conToday,cogsMonth=foodMonth+pkgMonth+conMonth;
  const gpToday=t.sales-cogsToday,fcToday=t.sales>0?Math.round(foodToday/t.sales*100):0;
  const gpMonth=salesMonth-cogsMonth,fcMonth=salesMonth>0?Math.round(foodMonth/salesMonth*100):0;
  const custById=Object.fromEntries(customers.map(c=>[c.id,c]));let newToday=0,returningToday=0;
  for(const id of todayIds){const c=custById[id];if(!c)continue;(c.total_orders||0)<=1?newToday++:returningToday++;}
  const lapsedCount=customers.filter(c=>daysSince(c.last_order_at)>=7).length;
  const cut14=Date.now()-14*DAY,cut7=Date.now()-7*DAY,cut30=Date.now()-30*DAY,qty14={},last7={},prev7={},addon14={},chan={};let s7=0,s30=0;
  for(const o of orders){const tm=new Date(o.ordered_at).getTime(),net=Number(o.net_total)||0;
    if(tm>=cut7)s7+=net;if(tm>=cut30){s30+=net;const k=o.source||"other";(chan[k]||(chan[k]={count:0,sales:0}));chan[k].count++;chan[k].sales+=net;}
    for(const it of o.order_items||[]){const q=Number(it.quantity)||0;if(tm>=cut14)qty14[it.item_name]=(qty14[it.item_name]||0)+q;if(tm>=cut7)last7[it.item_name]=(last7[it.item_name]||0)+q;else if(tm>=cut14)prev7[it.item_name]=(prev7[it.item_name]||0)+q;if(tm>=cut14)for(const ad of it.order_item_addons||[])addon14[ad.name]=(addon14[ad.name]||0)+(Number(ad.quantity)||0);}}

  const newTotal=rows.reduce((s,x)=>s+x.newInRange,0),spendTotal=rows.reduce((s,x)=>s+x.spend,0),maxCount=Math.max(1,...rows.map(x=>x.count));
  const labeled=src=>src==="__none"?"ไม่ระบุแหล่งที่มา":(acqLabel(src)||src);
  const withData=rows.filter(x=>x.src!=="__none"&&x.count>0);
  const bestAvg=[...withData].sort((a,b)=>b.avg-a.avg)[0],bestRepeat=[...withData].sort((a,b)=>b.repeatPct-a.repeatPct)[0];
  body.innerHTML=`
    <div class="sec"><div class="grid">
      ${cell("ลูกค้าทั้งหมด",total+" คน")}
      ${cell("ลูกค้าใหม่ในช่วง",newTotal+" คน","ตาม created_at")}
      ${cell("จำนวนช่องทาง",rows.filter(x=>x.src!=="__none").length+" ช่อง")}
      ${cell("ยอดซื้อรวมสะสม",fmtTHB(spendTotal))}
    </div></div>
    <div class="sec"><div class="sectitle">ลูกค้าตามช่องทาง (Customer Source)</div><div class="block">
      ${rows.length?rows.map(x=>`<div style="margin-bottom:13px"><div class="row"><span>${labeled(x.src)}</span><b class="tnum">${x.count} คน · ${x.pct}%</b></div><div style="height:7px;border-radius:99px;background:#eee;margin-top:4px;overflow:hidden"><div style="height:100%;width:${Math.round(x.count/maxCount*100)}%;background:${x.src==="__none"?"#bbb":BRAND.orange}"></div></div><div class="cmeta" style="margin-top:4px">ใหม่ในช่วง ${x.newInRange} · ซื้อซ้ำ ${x.repeat} (${x.repeatPct}%) · ยอดสะสม ${fmtTHB(x.spend)} · เฉลี่ย/คน ${fmtTHB(x.avg)}</div></div>`).join(""):`<div class="cmeta">ยังไม่มีข้อมูลแหล่งที่มา — ไปตั้งในหน้าแก้ไขลูกค้า</div>`}
    </div></div>
    ${withData.length?`<div class="sec"><div class="sectitle">⭐ ช่องทางคุณภาพดี</div><div class="block"><div class="costsum">
      <div class="row"><span>💰 เฉลี่ยยอดซื้อ/คน สูงสุด</span><b>${labeled(bestAvg.src)} · ${fmtTHB(bestAvg.avg)}</b></div>
      <div class="row" style="margin-top:6px"><span>🔁 % ซื้อซ้ำ สูงสุด</span><b>${labeled(bestRepeat.src)} · ${bestRepeat.repeatPct}%</b></div>
      <div class="cmeta" style="margin-top:8px">ยอดซื้อ/ซื้อซ้ำ = ค่าสะสมตลอดอายุลูกค้า (lifetime) · ลูกค้าใหม่ = นับตามวันที่เพิ่มเข้าระบบในช่วงที่เลือก</div>

    <div style="height:20px"></div>`;
}

function aiCard(ins,i){const bar=ins.tone==="alert"?BRAND.down:(ins.tone==="warn"?BRAND.amber:BRAND.up);return `<button class="acard" data-ai="${i}"><div class="abar" style="background:${bar}"></div><div class="abody"><div class="atop"><span class="aicon">${ins.icon}</span><div style="flex:1"><div class="atitle">${esc(ins.title)}</div><div class="adesc">${esc(ins.body)}</div>${ins.go?`<div class="ago">${esc(ins.go)} →</div>`:""}</div></div></div></button>`;}
function topList(title,arr,unit){const top=arr.slice(0,3);return `<div class="mli" style="font-weight:700;color:var(--slate)"><span>${title}</span><span></span></div>`+(top.length?top.map(x=>`<div class="mli"><span>${esc(x.name)}</span><span class="q">${x.qty} ${unit}</span></div>`).join(""):`<div class="mli"><span class="q">ยังไม่มี</span></div>`);}

const ENTITY_TH={inventory_items:"วัตถุดิบ/บรรจุภัณฑ์",packaging_defaults:"ค่าเริ่มต้นบรรจุภัณฑ์",channel_prices:"ราคาตามช่องทาง",ingredients:"วัตถุดิบ",ingredient_purchases:"การซื้อ",recipe_items:"สูตร",menu_items:"เมนู",categories:"หมวดหมู่",addons:"Add-on",addon_links:"การผูก Add-on"};
const FIELD_TH={name:"ชื่อ",name_en:"ชื่ออังกฤษ",kind:"ประเภทรายการ",price:"ราคาขาย",cost:"ต้นทุน/จาน",category:"หมวดหมู่",product_type:"ประเภท",is_active:"เปิดขาย/ใช้งาน",base_unit:"หน่วย",qty:"ปริมาณ",qty_base:"ปริมาณ",total_price:"ราคารวม",purchased_at:"วันที่ซื้อ",note:"หมายเหตุ",sort_order:"ลำดับ",color:"สี",ingredient_id:"วัตถุดิบ",inventory_item_id:"วัตถุดิบ",menu_item_id:"เมนู",addon_id:"Add-on"};
const ACT_TH={INSERT:["เพิ่ม","#0E9F6E"],UPDATE:["แก้ไข","#F59E0B"],DELETE:["ลบ","#E02424"]};
function auditVal(field,v){
  if(v==null)return "—";
  if(field==="is_active")return v?"เปิด":"ปิด";
  if(field==="product_type")return (TYPES.find(t=>t[0]===v)||[v,v])[1];
  if(typeof v==="object")return JSON.stringify(v);
  if((field==="price"||field==="cost"||field==="total_price")&&!isNaN(v))return fmtTHB(Number(v));
  if(field==="ingredient_id"||field==="menu_item_id"||field==="addon_id"){const im=ingMap()[v];if(im)return im.name;const mm=menuMap()[v];if(mm)return mm.name;const am=addonMap()[v];if(am)return am.name;return String(v).slice(0,8);}
  return String(v);
}
function auditLabel(log){
  const ch=log.changes||{};
  if(log.action==="UPDATE"){return Object.keys(ch).filter(k=>FIELD_TH[k]||true).map(k=>`${FIELD_TH[k]||k}: <span style="color:var(--slate)">${esc(auditVal(k,ch[k]&&ch[k].old))}</span> → <b>${esc(auditVal(k,ch[k]&&ch[k].new))}</b>`).join("<br>");}
  const name=ch.name||ch.item_name;const parts=[];if(name)parts.push(`<b>${esc(name)}</b>`);
  for(const k of ["price","cost","qty","qty_base","total_price","purchased_at","category"])if(ch[k]!=null)parts.push(`${FIELD_TH[k]||k}: ${esc(auditVal(k,ch[k]))}`);
  return parts.join(" · ")||"(รายการ)";
}

async function saveCategory(c,getColor,getActive){
  const name=val("catName").trim();if(!name){toast("ใส่ชื่อหมวด");return;}
  const sort_order=parseInt(val("catSort"))||0,color=getColor(),is_active=getActive();
  const btn=document.getElementById("save");btn.disabled=true;btn.textContent="กำลังบันทึก…";
  try{
    await withReason(val("rsnCat"),async()=>{
      if(c){
        if(name!==c.name){
          await patch(state.s,`menu_items?store_id=eq.${state.data.store.id}&category=eq.${encodeURIComponent(c.name)}`,{category:name});
          await patch(state.s,`addon_links?store_id=eq.${state.data.store.id}&category=eq.${encodeURIComponent(c.name)}`,{category:name});
          if(state.menuFilter===c.name)state.menuFilter=name;
        }
        await patch(state.s,`categories?id=eq.${c.id}`,{name,sort_order,color,is_active});
      }else{
        await post(state.s,"categories",{store_id:state.data.store.id,name,sort_order,color,is_active},"return=minimal");
      }
    });
    await reloadData();renderCategoryManager();toast("บันทึกหมวดแล้ว");
  }catch(e){const m=String(e.message||"");toast(/duplicate|unique/i.test(m)?"มีหมวดชื่อนี้แล้ว":m);btn.disabled=false;btn.textContent="บันทึก";}
}
async function deleteCategory(c){
  try{
    const used=await rest(state.s,`menu_items?select=id&store_id=eq.${state.data.store.id}&category=eq.${encodeURIComponent(c.name)}&limit=1`);
    if(used.length){toast("หมวดนี้ยังมีเมนูอยู่ กรุณาย้ายเมนูก่อน");return;}
    await withReason(val("rsnCat"),async()=>{
      await del(state.s,`addon_links?store_id=eq.${state.data.store.id}&category=eq.${encodeURIComponent(c.name)}`);

    });
    if(state.menuFilter===c.name)state.menuFilter=null;
    await reloadData();renderCategoryManager();toast("ลบหมวดแล้ว");
  }catch(e){toast(e.message);}
}

function defaultPackagingLines(){
  const cartMenus=new Set(Object.keys(draft.cart||{}));const out={};
  for(const d of (state.data.pkgDefaults||[])){
    if(d.active===false)continue;
    if(d.source && d.source!==draft.source)continue;
    if(d.menu_item_id && !cartMenus.has(d.menu_item_id))continue;
    out[d.inventory_item_id]=(out[d.inventory_item_id]||0)+Number(d.qty||0);
  }
  return Object.entries(out).map(([item_id,qty])=>({item_id,qty}));
}
function mergePackagingDefaults(){
  if(!draft.packaging)draft.packaging=[];
  if(draft.pkgLoaded)return;
  if(!draft.pkgRemoved)draft.pkgRemoved={};
  const have=new Set(draft.packaging.map(p=>p.item_id));
  for(const line of defaultPackagingLines()){
    if(have.has(line.item_id)||draft.pkgRemoved[line.item_id])continue;
    draft.packaging.push(line);
  }
}

    ||`<div class="cmeta">ยังไม่มีบรรจุภัณฑ์/วัสดุ — เลือกช่องทางเพื่อเติมอัตโนมัติ หรือกดเพิ่มด้านล่าง</div>`;
  box.innerHTML=rows;
  (draft.packaging||[]).forEach((p,i)=>{const q=document.getElementById("pq_"+i);if(q)q.oninput=()=>{draft.packaging[i].qty=parseFloat(q.value)||0;const it=im[draft.packaging[i].item_id],cu=ingCostPerUnit(draft.packaging[i].item_id,mk);const c=document.getElementById("pc_"+i);if(c)c.textContent="฿"+fmt2(draft.packaging[i].qty*cu);updateOrderCost();};});
  box.querySelectorAll("[data-prm]").forEach(b=>b.onclick=()=>{const i=+b.dataset.prm,it=draft.packaging[i];if(it){draft.pkgRemoved=draft.pkgRemoved||{};draft.pkgRemoved[it.item_id]=1;draft.packaging.splice(i,1);}renderPackaging();updateOrderCost();});
  updateOrderCost();
}
function togglePkgPicker(){
  const box=document.getElementById("pkgPicker");if(!box)return;
  if(box.innerHTML){box.innerHTML="";return;}
  const items=pkgItems();if(!items.length){box.innerHTML=`<div class="cmeta" style="margin-top:8px">ยังไม่มีบรรจุภัณฑ์/วัสดุ — ไปเพิ่มที่ เมนู → ต้นทุน/สต็อก</div>`;return;}
  const used=new Set((draft.packaging||[]).map(p=>p.item_id));
  const groups=["packaging","supply"].map(k=>{const its=items.filter(i=>(i.kind||"supply")===k&&!used.has(i.id));if(!its.length)return "";return `<div class="cmeta" style="margin:6px 4px 2px;font-weight:700;color:${KIND_COLOR[k]}">${KIND_TH[k]}</div>`+its.map(i=>`<button class="pickitem" data-padd="${i.id}">${esc(i.name)} <span class="q" style="color:var(--slate)">(${esc(i.base_unit)})</span></button>`).join("");}).join("");
  box.innerHTML=`<div class="picker">${groups||`<div class="cmeta">เพิ่มครบแล้ว</div>`}</div>`;
  box.querySelectorAll("[data-padd]").forEach(b=>b.onclick=()=>{if(draft.pkgRemoved)delete draft.pkgRemoved[b.dataset.padd];draft.packaging.push({item_id:b.dataset.padd,qty:1});box.innerHTML="";renderPackaging();});
}
function orderFoodCost(mk){let food=0;for(const[id,e]of Object.entries(draft.cart||{})){if(!e.qty)continue;const sp=menuCostSplit(id,mk);let f=sp.food;for(const aid of Object.keys(e.addons||{}))f+=addonCostSplit(aid,mk).food;food+=f*e.qty;}return food;}
function packagingSplit(mk){let pkg=0,con=0;const im=ingMap();for(const p of (draft.packaging||[])){const it=im[p.item_id],k=it?(it.kind||"supply"):"supply",c=Number(p.qty)*ingCostPerUnit(p.item_id,mk);if(k==="packaging")pkg+=c;else con+=c;}return {pkg,con};}
function updateOrderCost(){
  const el=document.getElementById("orderCost");if(!el)return;
  const mk=pkgSaleMonth(),food=orderFoodCost(mk),{pkg,con}=packagingSplit(mk),cogs=food+pkg+con;
  let sales=0;for(const[id,e]of Object.entries(draft.cart||{})){if(!e.qty)continue;const ad=Object.values(e.addons||{}).reduce((x,a)=>x+a.price,0);sales+=(e.price+ad)*e.qty;}
  const profit=sales-cogs;
  el.innerHTML=`<div class="row"><span>ต้นทุนอาหาร (Food)</span><b class="tnum">${fmtTHB(food)}</b></div><div class="row" style="margin-top:3px"><span>บรรจุภัณฑ์ (Packaging)</span><b class="tnum">${fmtTHB(pkg)}</b></div><div class="row" style="margin-top:3px"><span>วัสดุสิ้นเปลือง (Consumable)</span><b class="tnum">${fmtTHB(con)}</b></div><div class="row" style="margin-top:4px;border-top:1px solid #f0d8c8;padding-top:5px"><span>COGS รวม</span><b class="tnum">${fmtTHB(cogs)}</b></div><div class="row" style="margin-top:3px"><span>กำไรขั้นต้น</span><b class="tnum" style="color:${BRAND.up}">${fmtTHB(profit)}</b></div>`;
}
function repriceCart(){if(draft.editId)return;const mm=menuMap(),am=addonMap();for(const[id,e]of Object.entries(draft.cart||{})){const m=mm[id];if(m)e.price=priceFor(m,draft.source);for(const aid of Object.keys(e.addons||{})){const a=am[aid];if(a)e.addons[aid].price=addonPriceFor(a,draft.source);}}}
function syncMenu(){
  let total=0,count=0;
  for(const m of state.data.menu){const e=draft.cart[m.id],q=e?e.qty:0;
    const cnt=document.getElementById("cnt_"+m.id);if(cnt)cnt.textContent=q;
    const row=document.getElementById("row_"+m.id);if(row)row.classList.toggle("on",q>0);
    const adbox=document.getElementById("ad_"+m.id);
    if(adbox){const avail=q>0?addonsForMenu(m):[];adbox.innerHTML=avail.map(a=>`<button class="achip ${e&&e.addons[a.id]?"on":""}" data-mid="${m.id}" data-aid="${a.id}">+${esc(a.name)} ฿${Math.round(addonPriceFor(a,draft.source))}</button>`).join("");
      adbox.querySelectorAll(".achip").forEach(ch=>ch.onclick=()=>{const ee=draft.cart[ch.dataset.mid];if(!ee)return;const a=addonMap()[ch.dataset.aid];if(ee.addons[ch.dataset.aid])delete ee.addons[ch.dataset.aid];else ee.addons[ch.dataset.aid]={name:a.name,price:addonPriceFor(a,draft.source)};syncMenu();});}
    if(q>0){const adSum=Object.values(e.addons).reduce((x,a)=>x+a.price,0);total+=(e.price+adSum)*q;count+=q;}
  }
  const btn=document.getElementById("saveBtn"),lbl=document.getElementById("saveLabel"),nbtn=document.getElementById("saveNextBtn");
  if(count>0){btn.disabled=false;lbl.textContent=`${draft.editId?"บันทึกการแก้ไข":"บันทึกออเดอร์"} · ${count} รายการ · ${fmtTHB(total)}`;}else{btn.disabled=true;lbl.textContent="เลือกเมนูก่อน";}
  btn.onclick=()=>saveOrder(false);
  if(nbtn){nbtn.disabled=count<=0;nbtn.onclick=()=>saveOrder(true);}
  mergePackagingDefaults();renderPackaging();
}
async function saveOrder(andNext){
  const entries=Object.entries(draft.cart).filter(([id,e])=>e.qty>0);
  if(!entries.length){toast("ยังไม่ได้เลือกเมนู");return;}
  const btn=document.getElementById("saveBtn"),lbl=document.getElementById("saveLabel"),nbtn=document.getElementById("saveNextBtn"),old=lbl?lbl.textContent:"";
  try{
    const store_id=state.data.store.id,orderedAt=fromLocalInput(val("orderedAt")),saleMonth=monthOf(new Date(orderedAt));let customer_id=null;
    if(draft.customer.mode==="existing"){
      if(!draft.customer.id){toast("ค้นหาแล้วเลือกลูกค้า หรือเพิ่มลูกค้าใหม่ก่อน");btn.disabled=false;lbl.textContent=old;return;}
      customer_id=draft.customer.id;
    }else if(draft.customer.mode==="new"||draft.customer.mode==="imported"){
      const name=(val("cfName")||draft.customer.name||"").trim();
      if(!name){toast("ใส่ชื่อลูกค้าก่อนบันทึก");btn.disabled=false;lbl.textContent=old;return;}
      const phone=(val("cfPhone")||draft.customer.phone||"").trim();
      const birthdate=(val("cfBirth")||draft.customer.birthdate||"")||null;
      const note=(val("cfNote")||draft.customer.note||"").trim()||null;
      const customer_type=draft.customer.mode==="imported"?"imported":"new";
      const acquisition_source=selectedAcq("cfAcq")||draft.customer.acq||null;
      let c;try{c=await post(state.s,"customers",{store_id,name,phone:phone||null,birthdate,note,customer_type,acquisition_source},"return=representation");}catch(e){toast("บันทึกลูกค้าไม่สำเร็จ: "+e.message);btn.disabled=false;lbl.textContent=old;return;}
      customer_id=c&&c[0]&&c[0].id;
      if(!customer_id){toast("สร้างลูกค้าไม่สำเร็จ — ยังไม่บันทึกออเดอร์");btn.disabled=false;lbl.textContent=old;return;}
    }else{
      toast("ค้นหาแล้วเลือกลูกค้า หรือเพิ่มลูกค้าใหม่ก่อนบันทึก");btn.disabled=false;lbl.textContent=old;return;
    }
    if(btn)btn.disabled=true;if(nbtn)nbtn.disabled=true;if(lbl)lbl.textContent="กำลังบันทึก…";
    const subtotal=entries.reduce((a,[id,e])=>a+(e.price+Object.values(e.addons).reduce((x,ad)=>x+ad.price,0))*e.qty,0);
    let oid;
    if(draft.editId){oid=draft.editId;await patch(state.s,`orders?id=eq.${oid}`,{customer_id,source:draft.source,ordered_at:orderedAt,subtotal,net_total:subtotal});await del(state.s,`order_items?order_id=eq.${oid}`);}
    else{const sub=jwtSub(state.s.token);const ob={store_id,customer_id,source:draft.source,status:"completed",ordered_at:orderedAt,subtotal,discount:0,net_total:subtotal};if(sub)ob.created_by=sub;const ord=await post(state.s,"orders",ob,"return=representation");oid=ord[0].id;}
    const itemsPayload=entries.map(([id,e])=>{const sp=menuCostSplit(id,saleMonth);return {order_id:oid,store_id,menu_item_id:id,item_name:e.name,unit_price:e.price,quantity:e.qty,line_total:e.price*e.qty,cost_snapshot:r2(sp.total),food_cost_snapshot:r2(sp.food),pkg_cost_snapshot:r2(sp.pkg)};});
    const items=await post(state.s,"order_items",itemsPayload,"return=representation");
    const byMenu={};for(const it of items)byMenu[it.menu_item_id]=it.id;
    const addonRows=[];for(const[id,e]of entries){const oiid=byMenu[id];for(const aid of Object.keys(e.addons)){const ad=e.addons[aid];const sp=addonCostSplit(aid,saleMonth);addonRows.push({order_item_id:oiid,store_id,addon_id:aid,name:ad.name,price:ad.price,quantity:e.qty,food_cost_snapshot:r2(sp.food),pkg_cost_snapshot:r2(sp.pkg)});}}
    if(addonRows.length)await post(state.s,"order_item_addons",addonRows,"return=minimal");
    if(draft.editId)await del(state.s,`order_packaging?order_id=eq.${oid}`);
    const im=ingMap();const pkgRows=(draft.packaging||[]).filter(p=>Number(p.qty)>0).map(p=>{const it=im[p.item_id],k=(it&&it.kind==="packaging")?"packaging":"supply";return {store_id,order_id:oid,inventory_item_id:p.item_id,kind:k,qty:Number(p.qty),unit_cost_snapshot:r2(ingCostPerUnit(p.item_id,saleMonth))};});
    if(pkgRows.length)await post(state.s,"order_packaging",pkgRows,"return=minimal");
    await reloadData();
    if(draft.editId){toast("แก้ไขออเดอร์แล้ว");navigate("orders");return;}
    toast("บันทึกออเดอร์แล้ว · "+fmtTHB(subtotal));
    if(andNext){const keepSource=draft.source,keepOrderedAt=draft.orderedAt;draft={editId:null,customer:{mode:"search"},cart:{},source:keepSource,orderedAt:keepOrderedAt};renderAdd();}
    else navigate("dash");
  }catch(e){toast(e.message||"บันทึกไม่สำเร็จ");if(lbl)lbl.textContent=old;syncMenu();}
}

function doLogout(msg){localStorage.removeItem(LS);const s=state.s||{};state.s=null;state.data=null;renderLogin({url:s.url,key:s.key,email:s.email},msg||"");}
(async function(){
  if(!CONFIG_READY()){renderLogin();return;}
  let saved=null;try{saved=JSON.parse(localStorage.getItem(LS)||"null");}catch(e){}
  if(saved&&saved.token){state.s={url:CONFIG.SUPABASE_URL,key:CONFIG.SUPABASE_ANON_KEY,email:saved.email,token:saved.token,refresh:saved.refresh,expiresAt:saved.expiresAt||0};
    try{await reloadData();navigate("dash");return;}
    catch(e){if(e.code===401)localStorage.removeItem(LS);renderLogin({email:saved.email});return;}}
  renderLogin();
})();
</script>
